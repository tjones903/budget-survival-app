<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip It</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0f2027;
color:white;
}

.nav{
display:flex;
justify-content:space-around;
background:#000;
padding:12px;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

.card{
background:#1e1e1e;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-top:10px;
background:#00e676;
font-weight:bold;
}

.big{font-size:24px;}
</style>
</head>

<body>

<div class="nav">
<div>Home</div>
<div>Tips</div>
<div>About</div>
</div>

<div class="container">

<!-- AI SCANNER -->
<div class="card">
<h3>📷 AI Item Scan</h3>

<input type="file" id="camera" accept="image/*">
<img id="preview" width="100%" style="display:none">

<button onclick="scanItem()">Scan Item</button>

<div id="scanDesc"></div>
<div class="big" id="worth">$0</div>
<div class="big" id="sell">$0</div>
<div class="big" id="profitScan">$0</div>
</div>

<!-- SMART SCANNER -->
<div class="card">
<h3>🧠 Smart Scanner</h3>

<input id="item" placeholder="Type item">

<button onclick="scanText('new')">New</button>
<button onclick="scanText('used')">Used</button>
<button onclick="scanText('cracked')">Cracked</button>

<div id="scanTextResult"></div>
</div>

<!-- PROFIT CALCULATOR -->
<div class="card">
<h3>💰 Profit Calculator</h3>

<input id="buy" type="number" placeholder="Buy Price">
<input id="sellInput" type="number" placeholder="Sell Price">

<button onclick="calc()">Check Profit</button>

<div class="big" id="profit">$0</div>
</div>

</div>

<script>

// 📷 FILE SCAN
function scanItem(){
document.getElementById("camera").click();
}

document.getElementById("camera").addEventListener("change",function(){
const file=this.files[0];
if(!file)return;

const reader=new FileReader();
reader.onload=()=>{
document.getElementById("preview").style.display="block";
document.getElementById("preview").src=reader.result;
processImage(reader.result);
};
reader.readAsDataURL(file);
});

// 💰 PRICE SYSTEM
function getPriceRange(item, brand){

if(item==="house") return [80000,400000];
if(item==="fridge") return [300,1500];
if(item==="air fryer") return [40,150];
if(item==="clock") return [15,150];
if(item==="perfume" || item==="cologne") return [40,200];
if(item==="clothes") return [10,150];

if(brand==="Jordan") return [140,200];
if(brand==="Nike") return [100,160];

if(item==="shoe") return [80,150];
if(item==="slide") return [25,60];

if(item==="couch") return [250,500];
if(item==="table") return [120,220];
if(item==="lamp") return [30,120];

if(item==="tv") return [300,1200];
if(item==="computer") return [300,1200];

if(item==="washer") return [200,600];
if(item==="dryer") return [200,600];
if(item==="stove") return [300,900];

if(item==="cable") return [5,30];
if(item==="charger") return [10,40];
if(item==="headphones") return [20,200];

if(item==="car") return [3000,10000];

return [20,40];
}

// 🎯 SMART SCANNER (FIXED)
function scanText(type){

let text=document.getElementById("item").value.toLowerCase();

if(!text){
document.getElementById("scanTextResult").innerText="Type item";
return;
}

let brand="";
if(text.includes("nike")) brand="Nike";
if(text.includes("jordan")) brand="Jordan";

let item="unknown";

if(text.includes("tv")) item="tv";
else if(text.includes("computer")||text.includes("monitor")) item="computer";
else if(text.includes("shoe")||text.includes("jordan")) item="shoe";
else if(text.includes("couch")) item="couch";
else if(text.includes("table")||text.includes("desk")) item="table";
else if(text.includes("washer")) item="washer";
else if(text.includes("dryer")) item="dryer";
else if(text.includes("stove")) item="stove";
else if(text.includes("car")) item="car";

let [low,high]=getPriceRange(item,brand);

if(type==="used"){low*=0.8;high*=0.8;}
if(type==="cracked"){low*=0.5;high*=0.5;}

low=Math.floor(low);
high=Math.floor(high);

let worth=Math.floor((low+high)/2);
let sellLow=high;
let sellHigh=Math.floor(high*1.3);
let profit=sellLow-worth;

let status="👍 GOOD FLIP";
if(profit<0) status="❌ BAD DEAL";
else if(profit>50) status="🔥 GREAT FLIP";

document.getElementById("scanTextResult").innerText=
text+" ("+type+")\nWorth: $"+worth+
"\nSell: $"+sellLow+"-"+sellHigh+
"\nProfit: $"+profit+" | "+status;
}

// 💰 PROFIT CALCULATOR (FIXED)
function calc(){

let buy=parseFloat(document.getElementById("buy").value);
let sell=parseFloat(document.getElementById("sellInput").value);

if(isNaN(buy)||isNaN(sell)){
document.getElementById("profit").innerText="Enter values";
return;
}

let profit=sell-buy;

let status="👍 GOOD FLIP";
if(profit<0) status="❌ BAD DEAL";
else if(profit<20) status="⚠️ LOW PROFIT";
else if(profit>50) status="🔥 GREAT FLIP";

document.getElementById("profit").innerText="$"+profit+" | "+status;
}

// 🧠 AI SCANNER (KEEP YOUR CURRENT ONE HERE — DO NOT CHANGE)

</script>

</body>
</html>
