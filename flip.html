<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip It</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #111;
  color: white;
}

.nav {
  display: flex;
  justify-content: space-around;
  background: #1a1a1a;
  padding: 12px;
}

.nav a {
  color: white;
  text-decoration: none;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #2a2a2a;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  font-size: 16px;
  color: white;
}

.green { background: #00c853; }
.orange { background: orange; }
.red { background: red; }
.blue { background: #2196f3; }

.big { font-size: 26px; }
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="tips.html">Tips</a>
  <a href="about.html">About</a>
</div>

<div class="container">

<!-- 📷 AI ITEM SCAN -->
<div class="card">
  <h3>📷 AI Item Scan</h3>

  <!-- CAMERA OPENS -->
  <input type="file" accept="image/*" capture="environment" id="camera">

  <button class="green" onclick="scanItem()">Scan Item</button>

  <div id="scanDesc"></div>

  <div class="big" id="worth">$0</div>
  <div class="big" id="sell">$0</div>
  <div class="big" id="profitScan">$0</div>
</div>

<!-- 🧠 SMART SCANNER -->
<div class="card">
  <h3>🧠 Smart Scanner</h3>

  <input type="text" id="item" placeholder="Type item">

  <button class="green" onclick="scan('new')">New</button>
  <button class="orange" onclick="scan('used')">Used</button>
  <button class="red" onclick="scan('cracked')">Cracked</button>

  <div id="scanTextResult"></div>
</div>

<!-- 💰 PROFIT CALCULATOR -->
<div class="card">
  <h3>💰 Profit Calculator</h3>

  <input type="number" id="buy" placeholder="Buy Price">
  <input type="number" id="sellInput" placeholder="Sell Price">

  <button class="green" onclick="calc()">Check Profit</button>

  <div class="big" id="profit">$0</div>
  <div id="rating"></div>
</div>

<!-- 🔗 MARKET -->
<div class="card">
  <h3>🔗 Sell Fast</h3>

  <button class="blue" onclick="goMarket('fb')">Facebook Marketplace</button>
  <button class="blue" onclick="goMarket('ebay')">eBay</button>
  <button class="blue" onclick="goMarket('offerup')">OfferUp</button>
</div>

<div class="card">
  <button onclick="window.location.href='index.html'">⬅ Back</button>
</div>

</div>

<script>
function scanItem() {
  const file = document.getElementById("camera");

  if (!file.files.length) {
    document.getElementById("scanDesc").innerText = "Take a picture first";
    return;
  }

  document.getElementById("scanDesc").innerText = "🔍 Scanning item...";

  setTimeout(() => {

    // RANDOM ITEM TYPE
    const items = ["Phone", "Shoes", "Furniture", "Electronics"];
    const item = items[Math.floor(Math.random()*items.length)];

    // VALUE SYSTEM
    let worth = Math.floor(Math.random() * 100) + 50;
    let sellLow = Math.floor(worth * 1.3);
    let sellHigh = Math.floor(worth * 1.5);
    let profit = sellLow - worth;

    // DISPLAY
    document.getElementById("scanDesc").innerText =
      "Detected: " + item;

    document.getElementById("worth").innerText =
      "Worth: $" + worth;

    document.getElementById("sell").innerText =
      "Sell: $" + sellLow + " - $" + sellHigh;

    document.getElementById("profitScan").innerText =
      "Profit: $" + profit;

  }, 1500);
}

function scan(type) {
  let item = document.getElementById("item").value.toLowerCase();
  let result = "";

  if (!item) {
    result = "Enter item first";
  } else {
    if (item.includes("phone")) result = "📱 Phones flip fast";
    else if (item.includes("shoes")) result = "👟 Clean & resell";
    else if (item.includes("couch")) result = "🪑 Furniture flip $50+";
    else result = "Check demand locally";
  }

  document.getElementById("scanTextResult").innerText = result;
}

function calc() {
  let buy = +document.getElementById("buy").value || 0;
  let sell = +document.getElementById("sellInput").value || 0;
  let profit = sell - buy;

  document.getElementById("profit").innerText = "$" + profit;
  document.getElementById("rating").innerText =
    profit <= 0 ? "Bad deal" : profit < 20 ? "Low profit" : "Great flip";
}

function goMarket(type) {
  if (type === "fb") window.open("https://facebook.com/marketplace");
  if (type === "ebay") window.open("https://ebay.com");
  if (type === "offerup") window.open("https://offerup.com");
}
</script>

</body>
</html>
