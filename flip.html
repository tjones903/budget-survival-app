<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip It</title>

<link rel="icon" href="icon.png">

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f2027, #0f0f0f);
  color: white;
}

.nav {
  display: flex;
  justify-content: space-around;
  background: rgba(0,0,0,0.5);
  padding: 12px;
}

.nav a { color: white; text-decoration: none; }

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: rgba(30,30,30,0.6);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  font-weight: bold;
  background: linear-gradient(45deg,#00e676,#00c853);
  color: black;
}

.big { font-size: 26px; }

.sell-btn {
  background: linear-gradient(45deg,#2196f3,#00e5ff);
}
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="tips.html">Tips</a>
  <a href="about.html">About</a>
</div>

<div class="container">

<div class="card">
  <h3>📷 AI Item Scan</h3>

  <input type="file" accept="image/*" id="camera" style="display:none;">
  <img id="preview" width="100%" style="display:none; border-radius:10px;">

  <button onclick="scanItem()">Scan Item</button>

  <button onclick="startCamera()">Use Camera (Desktop)</button>
  <video id="video" width="100%" autoplay style="display:none;"></video>
  <button onclick="takePhoto()" id="snapBtn" style="display:none;">Take Photo</button>

  <div id="scanDesc"></div>
  <div class="big" id="worth">$0</div>
  <div class="big" id="sell">$0</div>
  <div class="big" id="profitScan">$0</div>

  <button class="sell-btn" onclick="openFB()">Open Facebook Marketplace</button>
  <button class="sell-btn" onclick="openEbay()">Open eBay</button>
  <button class="sell-btn" onclick="openOfferUp()">Open OfferUp</button>
</div>

<div class="card">
  <h3>🧠 Smart Scanner</h3>

  <input id="item" placeholder="Type item">

  <button onclick="scanText('new')">New</button>
  <button onclick="scanText('used')">Used</button>
  <button onclick="scanText('cracked')">Cracked</button>

  <div id="scanTextResult"></div>
</div>

<div class="card">
  <h3>💰 Profit Calculator</h3>

  <input id="buy" type="number" placeholder="Buy Price">
  <input id="sellInput" type="number" placeholder="Sell Price">

  <button onclick="calc()">Check Profit</button>

  <div class="big" id="profit">$0</div>
</div>

<div class="card">
  <h3>🏆 Progress</h3>
  <div id="points">Points: 0</div>
</div>

<div class="card">
  <button onclick="window.location.href='index.html'">⬅ Back to Home</button>
</div>

</div>

<script>
let points = 0;

function reward(p=0){
  points += 10;
  document.getElementById("points").innerText = "Points: " + points;
}

function scanItem(){
  const input = document.getElementById("camera");
  input.value = null;
  setTimeout(()=>{ input.click(); },50);
}

document.getElementById("camera").addEventListener("change", function(){
  const file = this.files[0];
  if(!file) return;

  const img = document.getElementById("preview");
  img.style.display = "block";
  img.src = URL.createObjectURL(file);

  const reader = new FileReader();
  reader.onloadend = () => processImage(reader.result);
  reader.readAsDataURL(file);
});

async function startCamera(){
  const video = document.getElementById("video");
  const snapBtn = document.getElementById("snapBtn");

  video.style.display = "block";
  snapBtn.style.display = "block";

  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
}

function takePhoto(){
  const video = document.getElementById("video");

  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video,0,0);
  const imgData = canvas.toDataURL("image/jpeg");

  video.srcObject.getTracks().forEach(t=>t.stop());
  video.style.display="none";
  document.getElementById("snapBtn").style.display="none";

  document.getElementById("preview").src = imgData;
  document.getElementById("preview").style.display = "block";

  processImage(imgData);
}

function getPriceRange(item, brand){
  if(item.includes("snack")) return [2,6];
  if(item.includes("water bottle")) return [2,10];

  if(brand==="Jordan") return [140,180];
  if(brand==="Nike") return [100,140];
  if(brand==="Adidas") return [90,130];

  if(item==="shoe") return [70,120];
  if(item==="couch") return [250,400];
  if(item==="table") return [120,180];
  if(item==="tv") return [400,700];

  return [20,40];
}

async function processImage(base64Image){
  document.getElementById("scanDesc").innerText="🔍 scanning...";

  const base64 = base64Image.split(',')[1];

  try{
    const res = await fetch(
      "https://vision.googleapis.com/v1/images:annotate?key=AIzaSyDqyJb86G978b_7LivNL5IgcjxytLupyPg",
      {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          requests:[{
            image:{content:base64},
            features:[
              {type:"LABEL_DETECTION",maxResults:5},
              {type:"LOGO_DETECTION",maxResults:3}
            ]
          }]
        })
      }
    );

    const data = await res.json();

    let labels = data.responses?.[0]?.labelAnnotations || [];
    let logos = data.responses?.[0]?.logoAnnotations || [];

    let text = labels.map(l=>l.description.toLowerCase()).join(" ");
    let brand = logos.length ? logos[0].description : "";

    // 🔥 FIXED DETECTION
    if(text.includes("shoe") || text.includes("footwear") || text.includes("sneaker") || text.includes("slide") || text.includes("sandal")){
      text="shoe";
    }
    else if(text.includes("chip") || text.includes("snack") || text.includes("food") || text.includes("ingredient")){
      text="snack";
    }
    else if(text.includes("bottle") || text.includes("drink")){
      text="water bottle";
    }
    else if(text.includes("couch") || text.includes("sofa")){
      text="couch";
    }
    else if(text.includes("table") || text.includes("desk")){
      text="table";
    }
    else if(text.includes("tv") || text.includes("screen") || text.includes("monitor")){
      text="tv";
    }
    else{
      text = text || "unknown item";
    }

    // 🔥 BRAND BOOST
    let fullText = text.toLowerCase();
    if(fullText.includes("nike") || fullText.includes("swoosh")) brand="Nike";
    if(fullText.includes("jordan") || fullText.includes("jumpman")) brand="Jordan";
    if(fullText.includes("adidas")) brand="Adidas";

    let [low, high] = getPriceRange(text, brand);

    let worth = Math.floor((low+high)/2);
    let sellLow = Math.floor(high);
    let sellHigh = Math.floor(high*1.3);
    let profit = sellLow - worth;

    document.getElementById("scanDesc").innerText = brand ? brand+" "+text : text;
    document.getElementById("worth").innerText="Worth: $"+worth;
    document.getElementById("sell").innerText="Sell: $"+sellLow+"-"+sellHigh;
    document.getElementById("profitScan").innerText="Profit: $"+profit;

    reward(profit);

  }catch{
    document.getElementById("scanDesc").innerText="Scan failed";
  }
}

/* SMART SCANNER */
function scanText(type){
  let text=document.getElementById("item").value.toLowerCase();

  let brand="";
  if(text.includes("nike")) brand="Nike";
  if(text.includes("jordan")) brand="Jordan";

  let item="object";
  if(text.includes("shoe")) item="shoe";
  if(text.includes("tv")) item="tv";
  if(text.includes("couch")) item="couch";

  let [low, high] = getPriceRange(item, brand);

  let worth = Math.floor((low+high)/2);

  if(type==="used") worth*=0.8;
  if(type==="cracked") worth*=0.5;

  worth=Math.floor(worth);

  let sellLow=Math.floor(high);
  let sellHigh=Math.floor(high*1.3);
  let profit=sellLow-worth;

  document.getElementById("scanTextResult").innerText =
    text+" ("+type+")\nWorth: $"+worth+
    "\nSell: $"+sellLow+"-"+sellHigh+
    "\nProfit: $"+profit;
}

/* PROFIT CALC */
function calc(){
  let buy=parseFloat(document.getElementById("buy").value)||0;
  let sell=parseFloat(document.getElementById("sellInput").value)||0;
  let profit=sell-buy;

  let status = profit>20 ? "🔥 GOOD FLIP" : "❌ BAD DEAL";

  document.getElementById("profit").innerText="$"+profit+" | "+status;
}

/* LINKS */
function openFB(){window.open("https://www.facebook.com/marketplace","_blank");}
function openEbay(){window.open("https://www.ebay.com","_blank");}
function openOfferUp(){window.open("https://offerup.com","_blank");}

</script>

</body>
</html>
