<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip It</title>

<link rel="icon" href="icon.png">

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f2027, #0f0f0f);
  color: white;
}

.nav {
  display: flex;
  justify-content: space-around;
  background: rgba(0,0,0,0.5);
  padding: 12px;
}

.nav a { color: white; text-decoration: none; }

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: rgba(30,30,30,0.6);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  font-weight: bold;
  background: linear-gradient(45deg,#00e676,#00c853);
  color: black;
}

.big { font-size: 26px; }

.sell-btn {
  background: linear-gradient(45deg,#2196f3,#00e5ff);
}
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="tips.html">Tips</a>
  <a href="about.html">About</a>
</div>

<div class="container">

<div class="card">
  <h3>📷 AI Item Scan</h3>

  <input type="file" accept="image/*" id="camera" style="display:none;">
  <img id="preview" width="100%" style="display:none; border-radius:10px;">

  <button onclick="scanItem()">Scan Item</button>

  <button onclick="startCamera()">Use Camera (Desktop)</button>
  <video id="video" width="100%" autoplay style="display:none;"></video>
  <button onclick="takePhoto()" id="snapBtn" style="display:none;">Take Photo</button>

  <div id="scanDesc"></div>
  <div class="big" id="worth">$0</div>
  <div class="big" id="sell">$0</div>
  <div class="big" id="profitScan">$0</div>

  <button class="sell-btn" onclick="openFB()">Open Facebook Marketplace</button>
  <button class="sell-btn" onclick="openEbay()">Open eBay</button>
  <button class="sell-btn" onclick="openOfferUp()">Open OfferUp</button>
</div>

<div class="card">
  <h3>🧠 Smart Scanner</h3>

  <input id="item" placeholder="Type item">

  <button onclick="scanText('new')">New</button>
  <button onclick="scanText('used')">Used</button>
  <button onclick="scanText('cracked')">Cracked</button>

  <div id="scanTextResult"></div>
</div>

<div class="card">
  <h3>💰 Profit Calculator</h3>

  <input id="buy" type="number" placeholder="Buy Price">
  <input id="sellInput" type="number" placeholder="Sell Price">

  <button onclick="calc()">Check Profit</button>

  <div class="big" id="profit">$0</div>
</div>

<div class="card">
  <h3>🏆 Progress</h3>
  <div id="points">Points: 0</div>
</div>

<div class="card">
  <button onclick="window.location.href='index.html'">⬅ Back to Home</button>
</div>

</div>

<script>

let points = 0;

function reward(p=0){
  points += 10;
  document.getElementById("points").innerText = "Points: " + points;
}

function scanItem(){
  const input = document.getElementById("camera");
  input.value = null;
  setTimeout(()=>{ input.click(); },50);
}

document.getElementById("camera").addEventListener("change", function(){
  const file = this.files[0];
  if(!file) return;

  const img = document.getElementById("preview");
  img.style.display = "block";
  img.src = URL.createObjectURL(file);

  const reader = new FileReader();
  reader.onloadend = () => processImage(reader.result);
  reader.readAsDataURL(file);
});

async function startCamera(){
  const video = document.getElementById("video");
  const snapBtn = document.getElementById("snapBtn");

  video.style.display = "block";
  snapBtn.style.display = "block";

  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
}

function takePhoto(){
  const video = document.getElementById("video");

  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video,0,0);
  const imgData = canvas.toDataURL("image/jpeg");

  video.srcObject.getTracks().forEach(t=>t.stop());
  video.style.display="none";
  document.getElementById("snapBtn").style.display="none";

  document.getElementById("preview").src = imgData;
  document.getElementById("preview").style.display = "block";

  processImage(imgData);
}

function getPriceRange(item, brand){

  if(item==="house") return [80000,400000];
  if(item==="fridge") return [300,1500];
  if(item==="air fryer") return [40,150];
  if(item==="clock") return [15,150];
  if(item==="perfume" || item==="cologne") return [40,200];
  if(item==="clothes") return [10,150];

  if(brand==="Jordan") return [140,200];
  if(brand==="Nike") return [100,160];

  if(item==="shoe") return [80,150];
  if(item==="slide") return [25,60];

  if(item==="couch") return [250,500];
  if(item==="table") return [120,220];
  if(item==="lamp") return [30,120];

  if(item==="tv") return [300,1200];
  if(item==="computer") return [300,1200];

  if(item==="washer") return [200,600];
  if(item==="dryer") return [200,600];
  if(item==="stove") return [300,900];

  if(item==="cable") return [5,30];
  if(item==="charger") return [10,40];
  if(item==="headphones") return [20,200];

  if(item==="car") return [3000,10000];

  return [20,40];
}

/* KEEP YOUR ORIGINAL processImage HERE */

/* 🔥 ADDED FUNCTIONS — NOW INSIDE SCRIPT (THIS WAS THE PROBLEM) */

function scanText(type){

  let text = document.getElementById("item").value.toLowerCase();

  if(!text){
    document.getElementById("scanTextResult").innerText = "Type an item first";
    return;
  }

  let brand = "";
  if(text.includes("nike")) brand="Nike";
  if(text.includes("jordan")) brand="Jordan";

  let itemType = "unknown";

  if(text.includes("house")) itemType="house";
  else if(text.includes("fridge")) itemType="fridge";
  else if(text.includes("air fryer")) itemType="air fryer";
  else if(text.includes("clock")) itemType="clock";
  else if(text.includes("perfume") || text.includes("cologne")) itemType="perfume";
  else if(text.includes("shirt") || text.includes("hoodie") || text.includes("jacket")) itemType="clothes";

  else if(text.includes("computer") || text.includes("monitor") || text.includes("display")) itemType="computer";
  else if(text.includes("tv")) itemType="tv";
  else if(text.includes("stove") || text.includes("oven")) itemType="stove";
  else if(text.includes("washer")) itemType="washer";
  else if(text.includes("dryer")) itemType="dryer";
  else if(text.includes("couch") || text.includes("sofa")) itemType="couch";
  else if(text.includes("table") || text.includes("desk")) itemType="table";
  else if(text.includes("lamp")) itemType="lamp";
  else if(text.includes("slide")) itemType="slide";
  else if(text.includes("shoe") || text.includes("sneaker")) itemType="shoe";
  else if(text.includes("cable") || text.includes("wire")) itemType="cable";
  else if(text.includes("charger")) itemType="charger";
  else if(text.includes("headphone")) itemType="headphones";
  else if(text.includes("car")) itemType="car";

  let [low, high] = getPriceRange(itemType, brand);

  if(type==="used"){ low*=0.8; high*=0.8; }
  if(type==="cracked"){ low*=0.5; high*=0.5; }

  low = Math.floor(low);
  high = Math.floor(high);

  let worth = Math.floor((low+high)/2);
  let sellLow = high;
  let sellHigh = Math.floor(high*1.3);
  let profit = sellLow - worth;

  let demand = "👍 GOOD FLIP";
  if(profit > 50) demand = "🔥 HIGH DEMAND";
  if(profit < 10) demand = "❌ NOT WORTH FLIPPING";

  document.getElementById("scanTextResult").innerText =
    text+" ("+type+")\n"+
    "Worth: $"+worth+
    "\nSell: $"+sellLow+"-"+sellHigh+
    "\nProfit: $"+profit+" | "+demand;
}

function calc(){
  let buy = parseFloat(document.getElementById("buy").value);
  let sell = parseFloat(document.getElementById("sellInput").value);

  if(isNaN(buy) || isNaN(sell)){
    document.getElementById("profit").innerText = "Enter both prices";
    return;
  }

  let profit = sell - buy;

  let status = "👍 GOOD FLIP";

  if(profit < 0) status = "❌ BAD DEAL";
  else if(profit < 20) status = "⚠️ LOW PROFIT";
  else if(profit > 50) status = "🔥 GREAT FLIP";

  document.getElementById("profit").innerText =
    "$"+profit+" | "+status;
}

</script>

</body>
</html>
