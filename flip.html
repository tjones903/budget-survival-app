<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip It</title>

<link rel="icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f2027, #0f0f0f);
  color: white;
}

.nav {
  display: flex;
  justify-content: space-around;
  background: rgba(0,0,0,0.5);
  padding: 12px;
  box-shadow: 0 0 10px rgba(0,255,200,0.2);
}

.nav a { color: white; text-decoration: none; }

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: rgba(30,30,30,0.6);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
  box-shadow: 0 0 20px rgba(0,255,200,0.2);
  transition: 0.3s;
}

.card:hover {
  box-shadow: 0 0 30px rgba(0,255,200,0.4);
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  font-weight: bold;
  background: linear-gradient(45deg,#00e676,#00c853);
  color: black;
}

button:hover {
  box-shadow: 0 0 20px #00e676;
}

.big { font-size: 26px; }
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="tips.html">Tips</a>
  <a href="about.html">About</a>
</div>

<div class="container">

<div class="card">
  <h3>📷 AI Item Scan</h3>

  <input type="file" accept="image/*" capture="environment" id="camera" style="display:none;">
  <img id="preview" width="100%" style="margin-top:10px; border-radius:10px; display:none;">

  <button onclick="scanItem()">Scan Item</button>

  <div id="scanDesc"></div>
  <div class="big" id="worth">$0</div>
  <div class="big" id="sell">$0</div>
  <div class="big" id="profitScan">$0</div>
</div>

<div class="card">
  <h3>🧠 Smart Scanner</h3>

  <input id="item" placeholder="Type item">

  <button onclick="scan('new')">New</button>
  <button onclick="scan('used')">Used</button>
  <button onclick="scan('cracked')">Cracked</button>

  <div id="scanTextResult"></div>
</div>

<div class="card">
  <h3>💰 Profit Calculator</h3>

  <input id="buy" type="number" placeholder="Buy Price">
  <input id="sellInput" type="number" placeholder="Sell Price">

  <button onclick="calc()">Check Profit</button>

  <div class="big" id="profit">$0</div>
</div>

<div class="card">
  <h3>🏆 Progress</h3>
  <div id="points">Points: 0</div>
</div>

<div class="card">
  <button onclick="window.location.href='index.html'">
⬅ Back to Home
</button>
</div>

</div>

<script>
let points = 0;

function reward(profit=0){
  points += 10;
  document.getElementById("points").innerText = "Points: " + points;

  let total = parseInt(localStorage.getItem("money")) || 0;
  total += profit;
  localStorage.setItem("money", total);
}

const cam = document.getElementById("camera");
cam.addEventListener("change", autoScan);

function scanItem(){
  cam.value = null;
  cam.click();
}

function autoScan(){
  const file = cam.files[0];

  if(!file){
    document.getElementById("scanDesc").innerText = "Take a picture first";
    return;
  }

  const img = document.getElementById("preview");
  img.style.display = "block";
  img.src = URL.createObjectURL(file);

  document.getElementById("scanDesc").innerText = "🔍 AI scanning...";

  const reader = new FileReader();

  reader.onloadend = async () => {
    const base64 = reader.result.split(',')[1];

    try {
      const res = await fetch(
        "https://vision.googleapis.com/v1/images:annotate?key=AIzaSyDqyJb86G978b_7LivNL5IgcjxytLupyPg",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            requests: [{
              image: { content: base64 },
              features: [{ type: "LABEL_DETECTION", maxResults: 5 }]
            }]
          })
        }
      );

      const data = await res.json();

      let item = "unknown";

      if(
        data.responses &&
        data.responses[0] &&
        data.responses[0].labelAnnotations &&
        data.responses[0].labelAnnotations.length > 0
      ){
        item = data.responses[0].labelAnnotations[0].description.toLowerCase();
      }

      // FIXES
      if(item.includes("rubber") || item.includes("synthetic")) item = "shoe";
      if(item.includes("carbon") || item.includes("fiber") || item.includes("metal")) item = "household item";
      if(item.includes("orange") || item.includes("food")) item = "snack";

      if(item.includes("fender")) item = "dog bowl";
      if(item.includes("bowl") || item.includes("dish")) item = "dog bowl";
      if(item.includes("dog") || item.includes("pet")) item = "pet supplies";

      // BRAND BOOST
      let brand = "";
      if(item.includes("nike")) brand = "Nike";
      if(item.includes("apple") || item.includes("iphone")) brand = "Apple";
      if(item.includes("samsung")) brand = "Samsung";
      if(item.includes("cheetos")) brand = "Cheetos";

      if(brand){
        item = brand + " " + item;
      }

      document.getElementById("scanDesc").innerText = item;

      // PRICING
      let worth = 0;

      if(item.includes("nike")) worth = 30 + Math.random()*40;
      else if(item.includes("shoe")) worth = 30 + Math.random()*40;
      else if(item.includes("iphone")) worth = 200 + Math.random()*300;
      else if(item.includes("laptop")) worth = 250 + Math.random()*400;
      else if(item.includes("pet")) worth = 10 + Math.random()*30;
      else if(item.includes("snack")) worth = 2 + Math.random()*5;
      else worth = 15 + Math.random()*50;

      worth = Math.floor(worth);

      let sellLow = Math.floor(worth * 1.4);
      let sellHigh = Math.floor(worth * 1.8);
      let profit = sellLow - worth;

      // DEMAND
      let demand = "";
      if(item.includes("iphone") || item.includes("nike")) demand = "🔥 FAST SELL";
      else if(item.includes("shoe") || item.includes("laptop")) demand = "⚡ MEDIUM DEMAND";
      else demand = "🐢 SLOW SELL";

      // PLATFORMS
      let platforms = "";

      if(item.includes("iphone") || item.includes("laptop")){
        platforms = "Sell on: Facebook Marketplace, eBay";
      }
      else if(item.includes("nike") || item.includes("shoe")){
        platforms = "Sell on: eBay, OfferUp";
      }
      else if(item.includes("pet") || item.includes("household")){
        platforms = "Sell on: Facebook Marketplace, OfferUp";
      }
      else{
        platforms = "Sell on: Facebook Marketplace";
      }

      document.getElementById("worth").innerText = "Worth: $" + worth;
      document.getElementById("sell").innerText = "Sell: $" + sellLow + " - $" + sellHigh;
      document.getElementById("profitScan").innerText =
        "Profit: $" + profit + " | " + demand + "\n" + platforms;

      reward(profit);

    } catch(err){
      document.getElementById("scanDesc").innerText = "Scan failed";
    }
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
