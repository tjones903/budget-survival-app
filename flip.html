<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip It</title>

<link rel="icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f2027, #0f0f0f);
  color: white;
}

.nav {
  display: flex;
  justify-content: space-around;
  background: rgba(0,0,0,0.5);
  padding: 12px;
}

.nav a { color: white; text-decoration: none; }

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: rgba(30,30,30,0.6);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  font-weight: bold;
  background: linear-gradient(45deg,#00e676,#00c853);
  color: black;
}

.big { font-size: 26px; }

.sell-btn {
  background: linear-gradient(45deg,#2196f3,#00e5ff);
}
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="tips.html">Tips</a>
  <a href="about.html">About</a>
</div>

<div class="container">

<div class="card">
  <h3>📷 AI Item Scan</h3>

  <input type="file" accept="image/*" capture="environment" id="camera" style="display:none;">
  <img id="preview" width="100%" style="display:none;">

  <button onclick="scanItem()">Scan Item</button>

  <!-- DESKTOP CAMERA -->
  <button onclick="startCamera()">Use Camera (Desktop)</button>
  <video id="video" width="100%" autoplay style="display:none;"></video>
  <button onclick="takePhoto()" id="snapBtn" style="display:none;">Take Photo</button>

  <div id="scanDesc"></div>
  <div class="big" id="worth">$0</div>
  <div class="big" id="sell">$0</div>
  <div class="big" id="profitScan">$0</div>

  <button class="sell-btn" onclick="openFB()">Open Facebook Marketplace</button>
  <button class="sell-btn" onclick="openEbay()">Open eBay</button>
  <button class="sell-btn" onclick="openOfferUp()">Open OfferUp</button>

</div>

<div class="card">
  <h3>🧠 Smart Scanner</h3>

  <input id="item" placeholder="Type item">

  <button onclick="scan('new')">New</button>
  <button onclick="scan('used')">Used</button>
  <button onclick="scan('cracked')">Cracked</button>

  <div id="scanTextResult"></div>
</div>

<div class="card">
  <h3>💰 Profit Calculator</h3>

  <input id="buy" type="number" placeholder="Buy Price">
  <input id="sellInput" type="number" placeholder="Sell Price">

  <button onclick="calc()">Check Profit</button>

  <div class="big" id="profit">$0</div>
</div>

<div class="card">
  <h3>🏆 Progress</h3>
  <div id="points">Points: 0</div>
</div>

<div class="card">
  <button onclick="window.location.href='index.html'">⬅ Back to Home</button>
</div>

</div>

<script>
let points = 0;

function reward(profit=0){
  points += 10;
  document.getElementById("points").innerText = "Points: " + points;
}

const cam = document.getElementById("camera");
cam.addEventListener("change", autoScan);

function scanItem(){
  cam.value = null;
  cam.click();
}

function autoScan(){
  const file = cam.files[0];

  if(!file){
    document.getElementById("scanDesc").innerText = "Take a picture first";
    return;
  }

  const reader = new FileReader();
  reader.onloadend = () => {
    processImage(reader.result);
  };
  reader.readAsDataURL(file);
}

// 🎥 START CAMERA
async function startCamera(){
  const video = document.getElementById("video");
  const snapBtn = document.getElementById("snapBtn");

  video.style.display = "block";
  snapBtn.style.display = "block";

  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
}

// 📸 TAKE PHOTO (FIXED)
function takePhoto(){
  const video = document.getElementById("video");

  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  const imgData = canvas.toDataURL("image/jpeg");

  // 🔥 STOP CAMERA (ADDED)
  const stream = video.srcObject;
  if(stream){
    stream.getTracks().forEach(track => track.stop());
  }

  // 🔥 RESET UI (ADDED)
  video.style.display = "none";
  document.getElementById("snapBtn").style.display = "none";

  processImage(imgData);
}

// 🔍 MAIN SCAN
async function processImage(base64Image){

  document.getElementById("scanDesc").innerText = "🔍 AI scanning...";

  const base64 = base64Image.split(',')[1];

  try {
    const res = await fetch(
      "https://vision.googleapis.com/v1/images:annotate?key=AIzaSyDqyJb86G978b_7LivNL5IgcjxytLupyPg",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          requests: [{
            image: { content: base64 },
            features: [{ type: "LABEL_DETECTION", maxResults: 5 }]
          }]
        })
      }
    );

    const data = await res.json();

    let item = data.responses?.[0]?.labelAnnotations?.[0]?.description?.toLowerCase() || "unknown";

    // FIX BAD DETECTIONS
    if(item.includes("ingredient") || item.includes("orange") || item.includes("chip")){
      item = "snack";
    }

    if(item.includes("plastic") || item.includes("rubber")){
      item = "shoe";
    }

    document.getElementById("scanDesc").innerText = item;

    let worth = 0;

    if(item.includes("snack")){
      worth = 2 + Math.random()*5;
    } else if(item.includes("shoe")){
      worth = 25 + Math.random()*40;
    } else {
      worth = 20 + Math.random()*50;
    }

    worth = Math.floor(worth);

    let sellLow = Math.floor(worth * 1.4);
    let sellHigh = Math.floor(worth * 1.8);
    let profit = sellLow - worth;

    let status = profit > 20 ? "🔥 GOOD FLIP" : "❌ NOT WORTH SELLING";

    document.getElementById("worth").innerText = "Worth: $" + worth;
    document.getElementById("sell").innerText = "Sell: $" + sellLow + "-" + sellHigh;
    document.getElementById("profitScan").innerText =
      "Profit: $" + profit + " | " + status;

    reward(profit);

  } catch(err){
    document.getElementById("scanDesc").innerText = "Scan failed";
  }
}

// SELL LINKS
function openFB(){
  window.open("https://www.facebook.com/marketplace","_blank");
}

function openEbay(){
  window.open("https://www.ebay.com","_blank");
}

function openOfferUp(){
  window.open("https://offerup.com","_blank");
}
</script>

</body>
</html>
