<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip It</title>

<link rel="icon" href="icon.png">

<!-- AI -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f2027, #0f0f0f);
  color: white;
}

.nav {
  display: flex;
  justify-content: space-around;
  background: rgba(0,0,0,0.5);
  padding: 12px;
  box-shadow: 0 0 10px rgba(0,255,200,0.2);
}

.nav a { color: white; text-decoration: none; }

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: rgba(30,30,30,0.6);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
  box-shadow: 0 0 20px rgba(0,255,200,0.2);
  transition: 0.3s;
}

.card:hover {
  box-shadow: 0 0 30px rgba(0,255,200,0.4);
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  font-weight: bold;
  background: linear-gradient(45deg,#00e676,#00c853);
  color: black;
}

button:hover {
  box-shadow: 0 0 20px #00e676;
}

.big { font-size: 26px; }
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="tips.html">Tips</a>
  <a href="about.html">About</a>
</div>

<div class="container">

<div class="card">
  <h3>📷 AI Item Scan</h3>

  <!-- 🔥 hidden camera input -->
  <input type="file" accept="image/*" capture="environment" id="camera" style="display:none;">

  <img id="preview" width="100%" style="margin-top:10px; border-radius:10px; display:none;">

  <button onclick="scanItem()">Scan Item</button>

  <div id="scanDesc"></div>
  <div class="big" id="worth">$0</div>
  <div class="big" id="sell">$0</div>
  <div class="big" id="profitScan">$0</div>
</div>

<div class="card">
  <h3>🧠 Smart Scanner</h3>

  <input id="item" placeholder="Type item">

  <button onclick="scan('new')">New</button>
  <button onclick="scan('used')">Used</button>
  <button onclick="scan('cracked')">Cracked</button>

  <div id="scanTextResult"></div>
</div>

<div class="card">
  <h3>💰 Profit Calculator</h3>

  <input id="buy" type="number" placeholder="Buy Price">
  <input id="sellInput" type="number" placeholder="Sell Price">

  <button onclick="calc()">Check Profit</button>

  <div class="big" id="profit">$0</div>
</div>

<div class="card">
  <h3>🏆 Progress</h3>
  <div id="points">Points: 0</div>
</div>

<div class="card">
  <button onclick="window.location.href='index.html'">
⬅ Back to Home
</button>
</div>

</div>

<script>
let points = 0;
let lastItem = "";
let model;

// load AI
mobilenet.load().then(m => {
  model = m;
});

function reward(profit=0){
  points += 10;
  document.getElementById("points").innerText = "Points: " + points;

  let total = parseInt(localStorage.getItem("money")) || 0;
  total += profit;
  localStorage.setItem("money", total);
}

const cam = document.getElementById("camera");

// listen for image capture
cam.addEventListener("change", autoScan);

// 🔥 FIXED SCAN BUTTON
function scanItem(){
  cam.value = null; // reset so it always opens camera
  cam.click();      // force camera open every time
}

function autoScan(){
  const file = cam.files[0];

  if(!file){
    document.getElementById("scanDesc").innerText = "Take a picture first";
    return;
  }

  const img = document.getElementById("preview");
  img.style.display = "block";
  img.src = URL.createObjectURL(file);

  document.getElementById("scanDesc").innerText = "🔍 AI scanning...";

  img.onload = async () => {

    const predictions = await model.classify(img);

    let raw = predictions[0].className.toLowerCase();

    let item = "";
    let category = "";

    if(raw.includes("shirt") || raw.includes("t-shirt") || raw.includes("jersey")){
      item = "Shirt"; category="clothing";
    }
    else if(raw.includes("shoe") || raw.includes("sneaker")){
      item = "Shoes"; category="clothing";
    }
    else if(raw.includes("couch") || raw.includes("sofa")){
      item = "Sofa"; category="furniture";
    }
    else if(raw.includes("chair")){
      item = "Chair"; category="furniture";
    }
    else if(raw.includes("table")){
      item = "Table"; category="furniture";
    }
    else if(raw.includes("bed")){
      item = "Bed"; category="furniture";
    }
    else if(raw.includes("laptop") || raw.includes("computer")){
      item = "Laptop"; category="electronics";
    }
    else if(raw.includes("phone")){
      item = "Phone"; category="electronics";
    }
    else if(raw.includes("tv")){
      item = "TV"; category="electronics";
    }
    else {
      item = predictions[0].className.split(",")[0];
      category = "general";
    }

    if(item === lastItem && predictions[1]){
      item = predictions[1].className.split(",")[0];
    }
    lastItem = item;

    let worth = 0;

    if(category==="clothing") worth = Math.floor(Math.random()*20)+10;
    else if(category==="furniture") worth = Math.floor(Math.random()*150)+50;
    else if(category==="electronics") worth = Math.floor(Math.random()*300)+100;
    else worth = Math.floor(Math.random()*50)+20;

    let sellLow = Math.floor(worth*1.3);
    let sellHigh = Math.floor(worth*1.5);
    let profit = sellLow - worth;

    document.getElementById("scanDesc").innerText = item;
    document.getElementById("worth").innerText = "Worth: $" + worth;
    document.getElementById("sell").innerText = "Sell: $" + sellLow + " - $" + sellHigh;
    document.getElementById("profitScan").innerText = "Profit: $" + profit;

    reward(profit);
  };
}

function scan(type){
  let worth = Math.floor(Math.random()*80)+30;
  if(type==="new") worth+=50;
  if(type==="used") worth+=10;
  if(type==="cracked") worth-=15;

  let sellLow = Math.floor(worth*1.3);
  let profit = sellLow - worth;

  document.getElementById("scanTextResult").innerText =
    "Worth: $" + worth + "\nSell: $" + sellLow + "\nProfit: $" + profit;

  reward(profit);
}

function calc(){
  let buy = +document.getElementById("buy").value || 0;
  let sell = +document.getElementById("sellInput").value || 0;
  let profit = sell - buy;

  document.getElementById("profit").innerText = "$" + profit;
  reward(profit);
}
</script>

</body>
</html>
