<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip It Scanner</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: linear-gradient(180deg, #0f0f0f, #1c1c1c);
  color: white;
}
.nav {
  display: flex;
  justify-content: space-around;
  background: #1a1a1a;
  padding: 12px;
}
.nav a {
  color: white;
  text-decoration: none;
}
.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}
.card {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
}
input, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}
input {
  background: #2a2a2a;
  color: white;
}
button {
  background: #00c853;
  color: white;
}
.big { font-size: 28px; }
.tip {
  background: #2a2a2a;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
}
.link-btn {
  background: #2196f3;
}
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="tips.html">Tips</a>
  <a href="about.html">About</a>
</div>

<div class="container">

<div class="card">
  <h3>📷 AI Item Scanner</h3>

  <input type="file" accept="image/*" onchange="previewImage(event)">
  <input type="file" accept="image/*" capture="environment" id="cameraInput" style="display:none;" onchange="handleCamera(event)">
  
  <img id="preview" style="width:100%; margin-top:10px; border-radius:10px; display:none;" />

  <button onclick="analyzeImage()">Scan Item</button>

  <div id="scanStatus"></div>
  <div id="scanResult"></div>
</div>

<div class="card">
  <h3>🧠 Smart Scanner</h3>
  <input type="text" id="item" placeholder="Enter item (couch, phone, shoes)">
  <button onclick="scan()">Scan Item</button>
  <div id="scanTextResult"></div>
</div>

<div class="card">
  <h3>💰 Profit Calculator</h3>
  <input type="number" id="buy" placeholder="Buy Price">
  <input type="number" id="sell" placeholder="Sell Price">
  <button onclick="calc()">Check Profit</button>
  <div class="big" id="profit">$0</div>
  <div id="rating"></div>
</div>

<div class="card">
  <h3>🔗 Sell Fast</h3>
  <button class="link-btn" onclick="goMarket('fb')">Facebook Marketplace</button>
  <button class="link-btn" onclick="goMarket('ebay')">eBay</button>
  <button class="link-btn" onclick="goMarket('offerup')">OfferUp</button>
</div>

<div class="card">
  <h3>📊 Trending Flips</h3>
  <div class="tip">📱 iPhones</div>
  <div class="tip">🪑 Furniture</div>
  <div class="tip">👟 Sneakers</div>
  <div class="tip">🎮 Game consoles</div>
</div>

<div class="card">
  <button onclick="window.location.href='index.html'">💰 Back to Budget</button>
  <button onclick="installApp()">⬇️ Install</button>
  <button onclick="shareApp()">📤 Share</button>
</div>

</div>

<script>
let model;

mobilenet.load().then(m => {
  model = m;
});

function previewImage(event) {
  const img = document.getElementById("preview");
  img.src = URL.createObjectURL(event.target.files[0]);
  img.style.display = "block";
}

function handleCamera(event) {
  const img = document.getElementById("preview");

  // clear old image
  img.src = "";
  img.style.display = "none";

  const file = event.target.files[0];
  img.src = URL.createObjectURL(file);
  img.style.display = "block";

  // clear old results
  document.getElementById("scanResult").innerHTML = "";
  document.getElementById("scanStatus").innerText = "";

  setTimeout(() => {
    runAI();
  }, 500);
}

// split logic so camera always works
async function analyzeImage() {
  const camera = document.getElementById("cameraInput");

  // force new camera every time
  camera.value = "";
  camera.click();
}

// actual AI runs here
async function runAI() {
  const status = document.getElementById("scanStatus");
  const result = document.getElementById("scanResult");
  const img = document.getElementById("preview");

  if (!model) {
    status.innerText = "⏳ Loading AI...";
    return;
  }

  status.innerText = "🔍 Analyzing...";
  result.innerHTML = "";

  const predictions = await model.classify(img);
  const itemName = predictions[0].className.toLowerCase();

  // 💰 REALISTIC MARKET PRICING
  let marketFactor = 0.8 + Math.random() * 0.7;

  let priceDB = {
    phone: [150, 600],
    iphone: [200, 800],
    laptop: [150, 700],
    tv: [80, 400],
    chair: [25, 150],
    couch: [50, 300],
    sneaker: [40, 250],
    shoe: [30, 200],
    bottle: [5, 30],
    bag: [50, 400],
    default: [20, 120]
  };

  let valueRange = priceDB.default;

  for (let key in priceDB) {
    if (itemName.includes(key)) {
      valueRange = priceDB[key];
      break;
    }
  }

  let value = Math.floor(
    valueRange[0] + Math.random() * (valueRange[1] - valueRange[0])
  );

  value = Math.floor(value * marketFactor);
  let sell = Math.floor(value * (1.3 + Math.random() * 0.7));

  status.innerText = "✅ Scan Complete";

  result.innerHTML = `
    <div class="tip">Detected Item: <b>${itemName}</b></div>
    <div class="tip">Estimated Value: <b>$${value}</b></div>
    <div class="tip">Suggested Sell Price: <b>$${sell}</b></div>
    <div class="tip">Potential Profit: <b>$${sell - value}</b></div>
  `;
}

function scan() {
  let item = document.getElementById("item").value.toLowerCase();
  let result = "";

  if (item.includes("couch")) result = "Furniture flip $50–$200 profit";
  else if (item.includes("phone")) result = "Phones flip fast";
  else if (item.includes("shoes")) result = "Clean and resell 2x";
  else result = "Look for cheap + high demand";

  document.getElementById("scanTextResult").innerText = result;
}

function calc() {
  let buy = parseFloat(document.getElementById("buy").value) || 0;
  let sell = parseFloat(document.getElementById("sell").value) || 0;
  let profit = sell - buy;

  document.getElementById("profit").innerText = "$" + profit;
  document.getElementById("rating").innerText =
    profit <= 0 ? "Bad deal"
    : profit < 20 ? "Low profit"
    : "Great flip";
}

function goMarket(type) {
  if (type === "fb") window.open("https://facebook.com/marketplace");
  if (type === "ebay") window.open("https://ebay.com");
  if (type === "offerup") window.open("https://offerup.com");
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

function installApp() {
  if (deferredPrompt) deferredPrompt.prompt();
  else alert("Add to Home Screen");
}

function shareApp() {
  if (navigator.share) {
    navigator.share({
      title: "Flip It",
      text: "Make money flipping items",
      url: window.location.href
    });
  } else {
    alert("Copy link: " + window.location.href);
  }
}
</script>

</body>
</html>
