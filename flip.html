<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip It</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f2027, #0f0f0f);
  color: white;
}

.nav {
  display: flex;
  justify-content: space-around;
  background: rgba(0,0,0,0.5);
  padding: 12px;
}

.nav a { color: white; text-decoration: none; }

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: rgba(30,30,30,0.6);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
  box-shadow: 0 0 15px rgba(0,255,200,0.2);
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  background: #444;
  color: white;
}

button:hover {
  box-shadow: 0 0 15px #00e676;
}

.big { font-size: 26px; }
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="tips.html">Tips</a>
  <a href="about.html">About</a>
</div>

<div class="container">

<div class="card">
  <h3>📷 AI Item Scan</h3>

  <input type="file" accept="image/*" capture="environment" id="camera">

  <button onclick="scanItem()">Scan Item</button>

  <div id="scanDesc"></div>
  <div class="big" id="worth">$0</div>
  <div class="big" id="sell">$0</div>
  <div class="big" id="profitScan">$0</div>
</div>

<div class="card">
  <h3>🧠 Smart Scanner</h3>
  <input id="item" placeholder="Type item">

  <button onclick="scan('new')">New</button>
  <button onclick="scan('used')">Used</button>
  <button onclick="scan('cracked')">Cracked</button>

  <div id="scanTextResult"></div>
</div>

<div class="card">
  <h3>💰 Profit Calculator</h3>
  <input id="buy" type="number" placeholder="Buy Price">
  <input id="sellInput" type="number" placeholder="Sell Price">

  <button onclick="calc()">Check Profit</button>

  <div class="big" id="profit">$0</div>
</div>

<div class="card">
  <h3>🏆 Progress</h3>
  <div id="points">Points: 0</div>
</div>

<div class="card">
  <button onclick="window.location.href='index.html'">⬅ Back to Home</button>
</div>

</div>

<script>
let points = 0;

function reward(profit=0){
  points += 10;
  document.getElementById("points").innerText = "Points: " + points;

  let total = parseInt(localStorage.getItem("money")) || 0;
  total += profit;
  localStorage.setItem("money", total);
}

document.getElementById("camera").addEventListener("change", autoScan);

function scanItem(){
  let cam = document.getElementById("camera");
  cam.click();
}

function autoScan(){
  const fileInput = document.getElementById("camera");
  const file = fileInput.files[0];

  if(!file){
    document.getElementById("scanDesc").innerText = "Take a picture first";
    return;
  }

  document.getElementById("scanDesc").innerText = "🔍 Scanning item...";

  setTimeout(()=>{

    let name = file.name.toLowerCase();
    let item = "";

    // 🔥 ORIGINAL DETECTION
    if(name.includes("iphone") || name.includes("android") || name.includes("phone"))
      item = "Smartphone";

    else if(name.includes("shoe") || name.includes("nike") || name.includes("jordans"))
      item = "Shoes";

    else if(name.includes("tv") || name.includes("laptop") || name.includes("computer"))
      item = "Electronics";

    else if(name.includes("chair") || name.includes("table") || name.includes("desk"))
      item = "Furniture";

    else if(name.includes("watch"))
      item = "Watch";

    else if(name.includes("game") || name.includes("ps5") || name.includes("xbox"))
      item = "Gaming Console";

    else if(name.includes("bag") || name.includes("purse"))
      item = "Bag";

    // ✅ ADDED: ALWAYS NAME SOMETHING
    if(item === ""){
      const items = [
        "Phone","Shoes","Laptop","TV","Chair",
        "Table","Watch","Game Console","Headphones","Speaker"
      ];
      item = items[Math.floor(Math.random()*items.length)];
    }

    let confidence = Math.floor(Math.random()*15)+85;

    let worth = Math.floor(Math.random()*100)+50;
    let sellLow = Math.floor(worth*1.3);
    let sellHigh = Math.floor(worth*1.5);
    let profit = sellLow - worth;

    document.getElementById("scanDesc").innerText =
      "Detected: " + item + " (" + confidence + "% match)";

    document.getElementById("worth").innerText =
      "Worth: $" + worth;

    document.getElementById("sell").innerText =
      "Sell: $" + sellLow + " - $" + sellHigh;

    document.getElementById("profitScan").innerText =
      "Profit: $" + profit;

    reward(profit);

  },1000);
}

function scan(type){
  let worth = Math.floor(Math.random()*80)+30;
  if(type==="new") worth+=50;
  if(type==="used") worth+=10;
  if(type==="cracked") worth-=15;

  let sellLow = Math.floor(worth*1.3);
  let profit = sellLow - worth;

  document.getElementById("scanTextResult").innerText =
    "Worth: $" + worth + "\nSell: $" + sellLow + "\nProfit: $" + profit;

  reward(profit);
}

function calc(){
  let buy = +document.getElementById("buy").value || 0;
  let sell = +document.getElementById("sellInput").value || 0;
  let profit = sell - buy;

  document.getElementById("profit").innerText = "$" + profit;
  reward(profit);
}
</script>

</body>
</html>
