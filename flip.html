<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip It</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f2027, #0f0f0f);
  color: white;
}

.nav {
  display: flex;
  justify-content: space-around;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  padding: 12px;
}

.nav a {
  color: #00e676;
  text-decoration: none;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: rgba(30,30,30,0.6);
  backdrop-filter: blur(15px);
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
  box-shadow: 0 0 15px rgba(0,255,200,0.2);
  animation: fadeIn 0.6s ease;
}

input, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

input {
  background: #1a1a1a;
  color: white;
}

button {
  background: linear-gradient(45deg,#00c853,#00e676);
  color: white;
  font-size: 16px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(0,255,200,0.5);
}

.big {
  font-size: 28px;
  text-shadow: 0 0 8px #00e676;
}

.tip {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 8px;
  margin-top: 8px;
}

.link-btn {
  background: linear-gradient(45deg,#2196f3,#03a9f4);
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="tips.html">Tips</a>
  <a href="about.html">About</a>
</div>

<div class="container">

<!-- 📷 SCANNER -->
<div class="card">
  <h3>📷 AI Item Scanner</h3>

  <input type="file" accept="image/*" onchange="previewImage(event)">
  
  <img id="preview" style="width:100%; margin-top:10px; border-radius:10px; display:none;" />

  <button onclick="analyzeImage()">Scan Item</button>

  <div id="scanStatus"></div>
  <div id="scanResult"></div>
</div>

<!-- 🧠 TEXT SCANNER -->
<div class="card">
  <h3>🧠 Smart Scanner</h3>

  <input type="text" id="item" placeholder="Enter item">
  <button onclick="scan()">Scan Item</button>

  <div id="scanTextResult"></div>
</div>

<!-- 💰 PROFIT -->
<div class="card">
  <h3>💰 Profit Calculator</h3>

  <input type="number" id="buy" placeholder="Buy Price">
  <input type="number" id="sell" placeholder="Sell Price">

  <button onclick="calc()">Check Profit</button>

  <div class="big" id="profit">$0</div>
  <div id="rating"></div>
</div>

<!-- 🔗 MARKET -->
<div class="card">
  <h3>🔗 Sell Fast</h3>

  <button class="link-btn" onclick="goMarket('fb')">Facebook Marketplace</button>
  <button class="link-btn" onclick="goMarket('ebay')">eBay</button>
  <button class="link-btn" onclick="goMarket('offerup')">OfferUp</button>
</div>

<!-- 📊 TRENDING -->
<div class="card">
  <h3>📊 Trending</h3>

  <div class="tip">📱 Phones</div>
  <div class="tip">🪑 Furniture</div>
  <div class="tip">👟 Shoes</div>
</div>

<div class="card">
  <button onclick="window.location.href='index.html'">⬅ Back</button>
</div>

</div>

<script>
function previewImage(event) {
  const img = document.getElementById("preview");
  img.src = URL.createObjectURL(event.target.files[0]);
  img.style.display = "block";
}

function analyzeImage() {
  const status = document.getElementById("scanStatus");
  const result = document.getElementById("scanResult");

  status.innerText = "🔍 Analyzing...";
  result.innerText = "";

  setTimeout(() => {
    const outcomes = [
      "📱 Phone detected",
      "🪑 Furniture detected",
      "👟 Shoes detected",
      "📦 General item"
    ];
    const random = outcomes[Math.floor(Math.random()*outcomes.length)];
    status.innerText = "✅ Done";
    result.innerText = random;
  }, 2000);
}

function scan() {
  let item = document.getElementById("item").value.toLowerCase();
  let result = "Check demand";

  if (item.includes("couch")) result = "Furniture flip $50+";
  if (item.includes("phone")) result = "Phones flip fast";
  if (item.includes("shoes")) result = "Clean & resell";

  document.getElementById("scanTextResult").innerText = result;
}

function calc() {
  let buy = +document.getElementById("buy").value || 0;
  let sell = +document.getElementById("sell").value || 0;
  let profit = sell - buy;

  document.getElementById("profit").innerText = "$" + profit;
  document.getElementById("rating").innerText =
    profit <= 0 ? "Bad deal" : profit < 20 ? "Low profit" : "Great flip";
}

function goMarket(type) {
  if (type === "fb") window.open("https://facebook.com/marketplace");
  if (type === "ebay") window.open("https://ebay.com");
  if (type === "offerup") window.open("https://offerup.com");
}
</script>

</body>
</html>
