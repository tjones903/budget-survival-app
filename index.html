<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Survival</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f2027, #0f0f0f);
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
  text-shadow: 0 0 15px #00e676;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-around;
  background: rgba(0,0,0,0.6);
  padding: 12px;
  box-shadow: 0 0 10px rgba(0,255,200,0.2);
}

.nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* CONTAINER */
.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

/* CARDS */
.card {
  background: rgba(30,30,30,0.7);
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
  box-shadow: 0 0 20px rgba(0,255,200,0.2);
  transition: 0.3s;
}

.card:hover {
  box-shadow: 0 0 30px rgba(0,255,200,0.4);
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #1f1f1f;
  color: white;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  background: linear-gradient(45deg, #00c853, #00e676);
  color: black;
  box-shadow: 0 0 10px rgba(0,255,150,0.4);
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
  box-shadow: 0 0 20px #00e676;
}

.big {
  font-size: 26px;
}

/* STATUS COLORS */
.status-good { color:#00e676; }
.status-warning { color:orange; }
.status-danger { color:red; }

.share-btn {
  background: linear-gradient(45deg, #00e676, #00c853);
}
</style>
</head>

<body>

<div class="header">💰 Budget Survival</div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="tips.html">Tips</a>
  <a href="about.html">About</a>
</div>

<div class="container">

<div class="card">
  <input id="income" placeholder="Monthly Income">
  <input id="expenses" placeholder="Monthly Expenses">
  <input id="days" placeholder="Days Left">

  <button onclick="calculate()">Calculate</button>
</div>

<div class="card">
  <div id="moneyLeft">$0</div>
  <div id="daily">$0</div>
  <div id="status"></div>
  <div id="message"></div>

  <button onclick="goFlip()">💸 Make Money</button>
  <button onclick="goLife()">🧠 Life Mode</button>

  <button class="share-btn" onclick="shareApp()">📤 Share App</button>
</div>

<div class="card">
  <h3>📊 Budget History</h3>

  <!-- ✅ ADDED EXPLANATION -->
  <div style="font-size:12px; opacity:0.7; margin-bottom:10px;">
    Shows your last calculations so you can track spending patterns and improve decisions.
  </div>

  <ul id="history"></ul>
</div>

<div class="card">
  <h3>💰 Total Money Made</h3>
  <div id="totalMoney">$0</div>
</div>

</div>

<script>
let history = JSON.parse(localStorage.getItem("history")) || [];
let totalMoney = parseInt(localStorage.getItem("money")) || 0;

function saveHistory(entry) {
  history.push(entry);
  localStorage.setItem("history", JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById("history");
  list.innerHTML = "";
  history.slice(-5).forEach(h => {
    const li = document.createElement("li");
    li.innerText = h;
    list.appendChild(li);
  });
}

function calculate() {
  let income = +document.getElementById("income").value || 0;
  let expenses = +document.getElementById("expenses").value || 0;
  let days = +document.getElementById("days").value || 1;

  let moneyLeft = income - expenses;
  let daily = moneyLeft / days;

  document.getElementById("moneyLeft").innerText = "Money Left: $" + moneyLeft;
  document.getElementById("daily").innerText = "Daily Budget: $" + daily.toFixed(2);

  let status = "", message = "", colorClass = "";

  if (daily < 10) {
    status = "🔴 Risk";
    message = "You are at risk.\nMoney Left: $" + moneyLeft + "\nDaily: $" + daily.toFixed(2) + "\nDays Left: " + days + "\nMake money ASAP";
    colorClass = "status-danger";
  } 
  else if (daily < 30) {
    status = "🟡 Careful";
    message = "Be careful.\nMoney Left: $" + moneyLeft + "\nDaily: $" + daily.toFixed(2) + "\nDays Left: " + days + "\nEarn extra income";
    colorClass = "status-warning";
  } 
  else {
    status = "🟢 Good";
    message = "You are in control.\nMoney Left: $" + moneyLeft + "\nDaily: $" + daily.toFixed(2) + "\nDays Left: " + days;
    colorClass = "status-good";
  }

  document.getElementById("status").innerText = status;
  document.getElementById("message").innerText = message;

  // ✅ APPLY COLORS TO EVERYTHING
  document.getElementById("moneyLeft").className = colorClass;
  document.getElementById("daily").className = colorClass;
  document.getElementById("status").className = colorClass;
  document.getElementById("message").className = colorClass;

  saveHistory("Left: $" + moneyLeft + " Daily: $" + daily.toFixed(2) + " Days: " + days);
}

function shareApp(){
  if(navigator.share){
    navigator.share({
      title: "Flip It App",
      text: "Check out this app!",
      url: window.location.href
    });
  } else {
    alert("Copy this link: " + window.location.href);
  }
}

function goFlip(){ window.location.href="flip.html"; }
function goLife(){ window.location.href="lifemode.html"; }

renderHistory();
document.getElementById("totalMoney").innerText = "$" + totalMoney;
</script>

</body>
</html>
