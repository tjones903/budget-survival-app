<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Survival Toolkit</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00c853">

<!-- 🔥 FREE BARCODE SCANNER -->
<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: linear-gradient(180deg, #0f0f0f, #1c1c1c);
  color: white;
}
.header { text-align:center; padding:15px; font-size:22px; font-weight:bold;}
.nav { display:flex; justify-content:space-around; background:#1a1a1a; padding:12px;}
.nav a { color:white; text-decoration:none;}
.container { padding:20px; max-width:500px; margin:auto;}
.card { background:#1e1e1e; padding:20px; border-radius:16px; margin-bottom:15px;}
input { width:100%; padding:14px; margin:8px 0; border-radius:10px; border:none; background:#2a2a2a; color:white;}
button { width:100%; padding:14px; border-radius:12px; background:#00c853; color:white; border:none; margin-top:10px;}
.big { font-size:32px;}
.progress { height:8px; background:#333; border-radius:10px; margin-top:10px;}
.progress-bar { height:8px; background:#00e676; border-radius:10px; width:0%;}
.money-btn { background:orange;}
.share-btn { background:#2196f3;}
.guide { margin-top:10px; font-size:14px;}
.status-good { color:#00e676;}
.status-warning { color:orange;}
.status-danger { color:red;}
</style>
</head>

<body>

<div class="header">💰 Budget Survival Toolkit</div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="tips.html">Tips</a>
  <a href="about.html">About</a>
</div>

<div class="container">

<div class="card">
  <input type="number" id="income" placeholder="Income ($)">
  <input type="number" id="expenses" placeholder="Expenses ($)">
  <input type="number" id="days" placeholder="Days until payday">
  <button onclick="calculate()">Calculate</button>
</div>

<div class="card">

  <div>Money Left</div>
  <div class="big" id="moneyLeft">$0.00</div>

  <div>Daily Budget</div>
  <div class="big" id="daily">$0.00</div>

  <div id="daysWarning">Enter values to begin</div>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="status"></div>
  <div id="actionGuide" class="guide"></div>

  <!-- 🔥 VALUE SYSTEM -->
  <div class="card">
    <div>💰 Quick Flip Value</div>
    <div class="big" id="flipWorth">$0</div>

    <div>🏷 Potential Sell Value</div>
    <div class="big" id="flipSell">$0</div>
  </div>

  <!-- 🔥 AUTO SCANNER -->
  <div class="card">
    <h3>📸 Auto Barcode Scanner</h3>

    <div id="scanner" style="width:100%; height:200px;"></div>

    <button onclick="startScanner()">Start Scan</button>
    <button onclick="stopScanner()">Stop Scan</button>

    <input type="text" id="scanResult" placeholder="Scanned item">

    <button onclick="lookupLivePrice()">Check Live Price</button>

    <div id="livePrice" class="big">$0</div>
  </div>

  <button class="money-btn" onclick="goFlip()">💸 Make Money Now</button>

  <button onclick="installApp()">⬇️ Install App</button>
  <button class="share-btn" onclick="shareApp()">📤 Share App</button>

</div>

</div>

<script>
function calculate() {
  const income = parseFloat(incomeEl.value)||0;
  const expenses = parseFloat(expensesEl.value)||0;
  const days = parseFloat(daysEl.value)||1;

  const moneyLeft = income - expenses;
  const daily = moneyLeft / days;

  moneyLeftEl.innerText="$"+moneyLeft.toFixed(2);
  dailyEl.innerText="$"+daily.toFixed(2);

  let guide="", flipWorth=0;

  if(daily<10){
    guide="🚨 You are about to run out of money. HIT MAKE MONEY NOW ASAP.";
    flipWorth=50;
  }else if(daily<30){
    guide="⚠️ You need money. Flip something today.";
    flipWorth=100;
  }else{
    guide="✅ You're good. Flip to grow.";
    flipWorth=150;
  }

  actionGuide.innerText=guide;
  actionGuide.style.color = daily<10?"red":daily<30?"orange":"#00e676";

  flipWorthEl.innerText="$"+flipWorth;
  flipSellEl.innerText="$"+(flipWorth*1.3).toFixed(0)+" - $"+(flipWorth*1.5).toFixed(0);
}

// 🔥 SCANNER (FREE)
function startScanner(){
  Quagga.init({
    inputStream:{name:"Live",type:"LiveStream",target:document.querySelector('#scanner')},
    decoder:{readers:["code_128_reader","ean_reader","upc_reader"]}
  },function(err){
    if(!err){Quagga.start();}
  });

  Quagga.onDetected(data=>{
    document.getElementById("scanResult").value=data.codeResult.code;
    stopScanner();
  });
}

function stopScanner(){
  Quagga.stop();
}

// 🔥 LIVE PRICE
function lookupLivePrice(){
  const item=scanResult.value;

  let base=100;
  if(item.includes("iphone")) base=300;

  livePrice.innerText="$"+(base*1.3).toFixed(0)+" - $"+(base*1.6).toFixed(0);

  window.open("https://www.ebay.com/sch/i.html?_nkw="+item,"_blank");
}

function goFlip(){window.location.href="flip.html";}
function installApp(){alert("Add to home screen");}
function shareApp(){alert("Share this app");}
</script>

</body>
</html>
