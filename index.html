<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Survival</title>

<style>
body{
margin:0;
font-family:system-ui;
background:radial-gradient(circle at top,#0f2027,#0f0f0f);
color:white;
text-align:center;
}

.header{
padding:20px;
font-size:26px;
text-shadow:0 0 12px #00e676;
}

.nav{
display:flex;
justify-content:space-around;
background:rgba(0,0,0,0.6);
padding:12px;
}

.nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

.card{
background:rgba(30,30,30,0.7);
padding:20px;
border-radius:15px;
margin:15px auto;
max-width:400px;
box-shadow:0 0 15px rgba(0,255,200,0.2);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
font-weight:bold;
background:linear-gradient(45deg,#00e676,#00c853);
}

.result{
margin-top:10px;
white-space:pre-line;
}

.history{
text-align:left;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">💰 Budget Survival</div>

<div class="nav">
<a href="index.html">Home</a>
<a href="tips.html">Tips</a>
<a href="about.html">About</a>
</div>

<!-- CALCULATOR -->
<div class="card">

<input id="income" placeholder="Income">
<input id="expenses" placeholder="Expenses">
<input id="days" placeholder="Days Left">

<button onclick="calcBudget()">Calculate</button>

<div id="output" class="result"></div>

<button onclick="location.href='flip.html'">💸 Make Money</button>
<button onclick="location.href='lifemode.html'">🧠 Life Mode</button>
<button onclick="share()">📤 Share App</button>

</div>

<!-- HISTORY -->
<div class="card history">
<h3>📊 Budget History</h3>
<ul id="history"></ul>
</div>

<!-- TOTAL -->
<div class="card">
<h3>💰 Total Money Made</h3>
<div id="total">$0</div>
</div>

<script>

let historyList = JSON.parse(localStorage.getItem("history")) || [];
let total = parseInt(localStorage.getItem("total")) || 0;

function calcBudget(){

let income=parseFloat(document.getElementById("income").value);
let expenses=parseFloat(document.getElementById("expenses").value);
let days=parseFloat(document.getElementById("days").value);

let left=income-expenses;
let daily=left/days;

let status="🟢 Good";
let msg="You are in control.";

if(left<0){
status="🔴 Risk";
msg="You are at risk.\nMake money ASAP";
}
else if(daily<20){
status="🟡 Careful";
msg="Be careful.\nEarn extra income";
}

document.getElementById("output").innerText=
"Money Left: $"+left+
"\nDaily Budget: $"+daily.toFixed(2)+
"\n"+status+
"\n"+msg+
"\nDays Left: "+days;

historyList.push("Left $"+left+" Daily $"+daily.toFixed(2));
localStorage.setItem("history",JSON.stringify(historyList));

render();
}

function render(){

let list=document.getElementById("history");
list.innerHTML="";
historyList.slice(-5).forEach(h=>{
let li=document.createElement("li");
li.innerText=h;
list.appendChild(li);
});

document.getElementById("total").innerText="$"+total;
}

function share(){
alert("Share your app link!");
}

render();

</script>

</body>
</html>
