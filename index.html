<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Survival Toolkit</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00c853">

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: linear-gradient(180deg, #0f0f0f, #1c1c1c);
  color: white;
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.nav {
  display: flex;
  justify-content: space-around;
  background: #1a1a1a;
  padding: 12px;
}

.nav a {
  color: white;
  text-decoration: none;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  background: #2a2a2a;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  background: #00c853;
  color: white;
  border: none;
  margin-top: 10px;
  font-size: 16px;
}

.big {
  font-size: 32px;
}

.progress {
  height: 8px;
  background: #333;
  border-radius: 10px;
  margin-top: 10px;
}

.progress-bar {
  height: 8px;
  background: #00e676;
  border-radius: 10px;
  width: 0%;
}

.money-btn {
  background: orange;
}

.share-btn {
  background: #2196f3;
}
</style>
</head>

<body>

<div class="header">💰 Budget Survival Toolkit</div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="tips.html">Tips</a>
  <a href="about.html">About</a>
</div>

<div class="container">

<div class="card">
  <input type="number" id="income" placeholder="Income ($)">
  <input type="number" id="expenses" placeholder="Expenses ($)">
  <input type="number" id="days" placeholder="Days until payday">

  <button onclick="calculate()">Calculate</button>
</div>

<div class="card">

  <div>Money Left</div>
  <div class="big" id="moneyLeft">$0.00</div>

  <div>Daily Budget</div>
  <div class="big" id="daily">$0.00</div>

  <div id="daysWarning">Enter values to begin</div>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="status"></div>

  <!-- 🔥 THIS OPENS FLIP IT -->
  <button class="money-btn" onclick="goFlip()">💸 Make Money Now</button>

  <button onclick="installApp()">⬇️ Install App</button>
  <button class="share-btn" onclick="shareApp()">📤 Share App</button>

</div>

</div>

<script>
function calculate() {
  const income = parseFloat(document.getElementById("income").value) || 0;
  const expenses = parseFloat(document.getElementById("expenses").value) || 0;
  const days = parseFloat(document.getElementById("days").value) || 1;

  const moneyLeft = income - expenses;
  const daily = moneyLeft / days;

  localStorage.setItem("income", income);
  localStorage.setItem("expenses", expenses);
  localStorage.setItem("days", days);

  document.getElementById("moneyLeft").innerText = "$" + moneyLeft.toFixed(2);
  document.getElementById("daily").innerText = "$" + daily.toFixed(2);

  document.getElementById("daysWarning").innerText =
    "You have " + days + " days left";

  let percent = income > 0 ? (expenses / income) * 100 : 0;
  document.getElementById("progressBar").style.width = percent + "%";

  document.getElementById("status").innerText =
    daily < 10 ? "⚠️ Risk of running out"
    : daily < 30 ? "⚠️ Be careful"
    : "✅ You're in control";
}

// 🔥 THIS CONNECTS TO FLIP IT
function goFlip() {
  window.location.href = "flip.html";
}

// INSTALL
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
  } else {
    alert("Tap Share → Add to Home Screen");
  }
}

// SHARE
function shareApp() {
  if (navigator.share) {
    navigator.share({
      title: "Budget Survival Toolkit",
      text: "Manage your money and stay on track",
      url: window.location.href
    });
  } else {
    alert("Copy link: " + window.location.href);
  }
}

// LOAD SAVED DATA
window.onload = () => {
  const income = localStorage.getItem("income");
  const expenses = localStorage.getItem("expenses");
  const days = localStorage.getItem("days");

  if (income) document.getElementById("income").value = income;
  if (expenses) document.getElementById("expenses").value = expenses;
  if (days) document.getElementById("days").value = days;

  if (income && expenses && days) calculate();
};
</script>

</body>
</html>
