<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Survival Toolkit</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f2027, #0f0f0f);
  color: white;
  overflow-x: hidden;
}

/* 🔥 GLOW HEADER */
.header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
  font-weight: bold;
  text-shadow: 0 0 10px #00ffcc;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-around;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  padding: 12px;
}

.nav a {
  color: #00e676;
  text-decoration: none;
}

/* CONTAINER */
.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

/* CARDS */
.card {
  background: rgba(30,30,30,0.6);
  backdrop-filter: blur(15px);
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
  box-shadow: 0 0 15px rgba(0,255,200,0.2);
  animation: fadeIn 0.6s ease;
}

/* INPUTS */
input {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  background: #1a1a1a;
  color: white;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  margin-top: 10px;
  font-size: 16px;
  color: white;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(0,255,200,0.5);
}

.green { background: linear-gradient(45deg,#00c853,#00e676); }
.orange { background: linear-gradient(45deg,orange,#ff9800); }
.blue { background: linear-gradient(45deg,#2196f3,#03a9f4); }
.purple { background: linear-gradient(45deg,purple,#9c27b0); }

.big {
  font-size: 32px;
  text-shadow: 0 0 8px #00e676;
}

/* PROGRESS */
.progress {
  height: 8px;
  background: #333;
  border-radius: 10px;
  margin-top: 10px;
}

.progress-bar {
  height: 8px;
  background: #00e676;
  border-radius: 10px;
  width: 0%;
  transition: 0.5s;
}

/* STATUS COLORS */
.status-good { color: #00e676; }
.status-warning { color: orange; }
.status-danger { color: red; }

.guide {
  margin-top: 10px;
  font-size: 14px;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="header">💰 Budget Survival Toolkit</div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="tips.html">Tips</a>
  <a href="about.html">About</a>
</div>

<div class="container">

<div class="card">
  <input type="number" id="income" placeholder="Income ($)">
  <input type="number" id="expenses" placeholder="Expenses ($)">
  <input type="number" id="days" placeholder="Days until payday">

  <button class="green" onclick="calculate()">Calculate</button>
</div>

<div class="card">

  <div>Money Left</div>
  <div class="big" id="moneyLeft">$0.00</div>

  <div>Daily Budget</div>
  <div class="big" id="daily">$0.00</div>

  <div id="daysWarning">Enter values</div>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="status"></div>
  <div id="actionGuide" class="guide"></div>

  <button class="orange" onclick="goFlip()">💸 Make Money</button>
  <button class="purple" onclick="goLife()">🧠 Life Mode</button>
  <button class="blue" onclick="shareApp()">📤 Share</button>

</div>

</div>

<script>
function calculate() {
  const income = +document.getElementById("income").value || 0;
  const expenses = +document.getElementById("expenses").value || 0;
  const days = +document.getElementById("days").value || 1;

  const moneyLeft = income - expenses;
  const daily = moneyLeft / days;

  document.getElementById("moneyLeft").innerText = "$" + moneyLeft.toFixed(2);
  document.getElementById("daily").innerText = "$" + daily.toFixed(2);

  let percent = income > 0 ? (expenses / income) * 100 : 0;
  document.getElementById("progressBar").style.width = percent + "%";

  let statusText = "";
  let statusClass = "";

  if (daily < 10) {
    statusText = "🔴 Risk";
    statusClass = "status-danger";
  } else if (daily < 30) {
    statusText = "🟡 Caution";
    statusClass = "status-warning";
  } else {
    statusText = "🟢 Good";
    statusClass = "status-good";
  }

  const statusEl = document.getElementById("status");
  statusEl.innerText = statusText;
  statusEl.className = statusClass;

  document.getElementById("actionGuide").innerText =
    daily < 10 ? "🚨 Make money now"
    : daily < 30 ? "⚠️ Earn extra"
    : "✅ Stay consistent";
}

function goFlip() {
  window.location.href = "flip.html";
}

function goLife() {
  window.location.href = "lifemode.html";
}

function shareApp() {
  alert("Share your app link");
}
</script>

</body>
</html>
