<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Survival Toolkit</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00c853">

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: linear-gradient(180deg, #0f0f0f, #1c1c1c);
  color: white;
}
.header { text-align:center; padding:15px; font-size:22px; font-weight:bold;}
.nav { display:flex; justify-content:space-around; background:#1a1a1a; padding:12px;}
.nav a { color:white; text-decoration:none;}
.container { padding:20px; max-width:500px; margin:auto;}
.card { background:#1e1e1e; padding:20px; border-radius:16px; margin-bottom:15px;}
input { width:100%; padding:14px; margin:8px 0; border-radius:10px; border:none; background:#2a2a2a; color:white;}
button { width:100%; padding:14px; border-radius:12px; background:#00c853; color:white; border:none; margin-top:10px;}
.big { font-size:32px;}
.progress { height:8px; background:#333; border-radius:10px; margin-top:10px;}
.progress-bar { height:8px; background:#00e676; border-radius:10px; width:0%;}
.money-btn { background:orange;}
.share-btn { background:#2196f3;}
.guide { margin-top:10px; font-size:14px;}
.status-good { color:#00e676;}
.status-warning { color:orange;}
.status-danger { color:red;}
</style>
</head>

<body>

<div class="header">💰 Budget Survival Toolkit</div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="tips.html">Tips</a>
  <a href="about.html">About</a>
</div>

<div class="container">

<div class="card">
  <input type="number" id="income" placeholder="Income ($)">
  <input type="number" id="expenses" placeholder="Expenses ($)">
  <input type="number" id="days" placeholder="Days until payday">
  <button onclick="calculate()">Calculate</button>
</div>

<div class="card">

  <div>Money Left</div>
  <div class="big" id="moneyLeft">$0.00</div>

  <div>Daily Budget</div>
  <div class="big" id="daily">$0.00</div>

  <div id="daysWarning">Enter values to begin</div>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="status"></div>
  <div id="actionGuide" class="guide"></div>

  <!-- 🔥 VALUE SYSTEM -->
  <div class="card">
    <div>💰 Quick Flip Value</div>
    <div class="big" id="flipWorth">$0</div>

    <div>🏷 Potential Sell Value</div>
    <div class="big" id="flipSell">$0</div>
  </div>

  <button class="money-btn" onclick="goFlip()">💸 Make Money Now</button>

  <button onclick="installApp()">⬇️ Install App</button>
  <button class="share-btn" onclick="shareApp()">📤 Share App</button>

</div>

</div>

<script>
function calculate() {
  const income = parseFloat(document.getElementById("income").value) || 0;
  const expenses = parseFloat(document.getElementById("expenses").value) || 0;
  const days = parseFloat(document.getElementById("days").value) || 1;

  const moneyLeft = income - expenses;
  const daily = moneyLeft / days;

  document.getElementById("moneyLeft").innerText = "$" + moneyLeft.toFixed(2);
  document.getElementById("daily").innerText = "$" + daily.toFixed(2);

  document.getElementById("daysWarning").innerText =
    "You have " + days + " days left";

  let percent = income > 0 ? (expenses / income) * 100 : 0;
  document.getElementById("progressBar").style.width = percent + "%";

  let statusText = "";
  let statusClass = "";

  if (daily < 10) {
    statusText = "🔴 Risk of running out";
    statusClass = "status-danger";
  } else if (daily < 30) {
    statusText = "🟡 Be careful";
    statusClass = "status-warning";
  } else {
    statusText = "🟢 You're in control";
    statusClass = "status-good";
  }

  const statusEl = document.getElementById("status");
  statusEl.innerText = statusText;
  statusEl.className = statusClass;

  // 🔥 SMART ACTION + VALUE
  let guide = "";
  let flipWorth = 0;

  if (daily < 10) {
    guide = "🚨 You are about to run out of money. Tap 'Make Money Now' ASAP.";
    flipWorth = 50;
  } else if (daily < 30) {
    guide = "⚠️ You need extra income. Flip something today.";
    flipWorth = 100;
  } else {
    guide = "✅ You're doing well. Keep going.";
    flipWorth = 150;
  }

  const guideEl = document.getElementById("actionGuide");
  guideEl.innerText = guide;

  if (daily < 10) guideEl.style.color = "red";
  else if (daily < 30) guideEl.style.color = "orange";
  else guideEl.style.color = "#00e676";

  document.getElementById("flipWorth").innerText = "$" + flipWorth;
  document.getElementById("flipSell").innerText =
    "$" + (flipWorth * 1.3).toFixed(0) + " - $" + (flipWorth * 1.5).toFixed(0);
}

function goFlip() {
  window.location.href = "flip.html";
}

function installApp() {
  alert("Tap Share → Add to Home Screen");
}

function shareApp() {
  alert("Copy link to share");
}
</script>

</body>
</html>
