<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Survival</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #111;
  color: white;
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.nav {
  display: flex;
  justify-content: space-around;
  background: #1a1a1a;
  padding: 12px;
}

.nav a {
  color: white;
  text-decoration: none;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #2a2a2a;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  font-size: 16px;
  color: white;
}

.green { background: #00c853; }
.orange { background: orange; }
.blue { background: #2196f3; }

.big {
  font-size: 28px;
}

/* COLORS BACK */
.status-good { color: #00e676; }
.status-warning { color: orange; }
.status-danger { color: red; }
</style>
</head>

<body>

<div class="header">💰 Budget Survival</div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="tips.html">Tips</a>
  <a href="about.html">About</a>
</div>

<div class="container">

<div class="card">
  <input type="number" id="income" placeholder="Income">
  <input type="number" id="expenses" placeholder="Expenses">
  <input type="number" id="days" placeholder="Days until payday">

  <button class="green" onclick="calculate()">Calculate</button>
</div>

<div class="card">

  <div>Money Left</div>
  <div class="big" id="moneyLeft">$0.00</div>

  <div>Daily Budget</div>
  <div class="big" id="daily">$0.00</div>

  <div id="status"></div>
  <div id="message"></div>

  <button class="orange" onclick="goFlip()">💸 Make Money Now</button>
  <button class="blue" onclick="goLife()">🧠 Life Mode</button>

</div>

</div>

<script>
function calculate() {
  const income = +document.getElementById("income").value || 0;
  const expenses = +document.getElementById("expenses").value || 0;
  const days = +document.getElementById("days").value || 1;

  const moneyLeft = income - expenses;
  const daily = moneyLeft / days;

  document.getElementById("moneyLeft").innerText = "$" + moneyLeft.toFixed(2);
  document.getElementById("daily").innerText = "$" + daily.toFixed(2);

  let statusText = "";
  let statusClass = "";
  let message = "";

  if (daily < 10) {
    statusText = "🔴 Risk of running out";
    statusClass = "status-danger";
    message = "🚨 You are about to run out of money. Tap 'Make Money Now' ASAP.";
  } 
  else if (daily < 30) {
    statusText = "🟡 Be careful";
    statusClass = "status-warning";
    message = "⚠️ You should earn extra income.";
  } 
  else {
    statusText = "🟢 You're in control";
    statusClass = "status-good";
    message = "✅ You are doing good.";
  }

  const statusEl = document.getElementById("status");
  statusEl.innerText = statusText;
  statusEl.className = statusClass;

  document.getElementById("message").innerText = message;
}

function goFlip() {
  window.location.href = "flip.html";
}

function goLife() {
  window.location.href = "lifemode.html";
}
</script>

</body>
</html>
