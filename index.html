<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Survival Toolkit</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: linear-gradient(180deg, #0f0f0f, #1c1c1c);
  color: white;
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.nav {
  display: flex;
  justify-content: space-around;
  background: #1a1a1a;
  padding: 12px;
}

.nav a {
  color: white;
  text-decoration: none;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  background: #2a2a2a;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  margin-top: 10px;
  font-size: 16px;
  color: white;
}

.green { background: #00c853; }
.orange { background: orange; }
.blue { background: #2196f3; }
.purple { background: purple; }

.big { font-size: 32px; }

.progress {
  height: 8px;
  background: #333;
  border-radius: 10px;
  margin-top: 10px;
}

.progress-bar {
  height: 8px;
  background: #00e676;
  border-radius: 10px;
  width: 0%;
}

.status-good { color: #00e676; }
.status-warning { color: orange; }
.status-danger { color: red; }

.guide { margin-top: 10px; font-size: 14px; }
</style>
</head>

<body>

<div class="header">💰 Budget Survival Toolkit</div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="tips.html">Tips</a>
  <a href="about.html">About</a>
</div>

<div class="container">

<div class="card">
  <input type="number" id="income" placeholder="Income ($)">
  <input type="number" id="expenses" placeholder="Expenses ($)">
  <input type="number" id="days" placeholder="Days until payday">

  <button class="green" onclick="calculate()">Calculate</button>
</div>

<div class="card">

  <div>Money Left</div>
  <div class="big" id="moneyLeft">$0.00</div>

  <div>Daily Budget</div>
  <div class="big" id="daily">$0.00</div>

  <div id="daysWarning">Enter values</div>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="status"></div>
  <div id="actionGuide" class="guide"></div>

  <!-- 💰 FLIP VALUE -->
  <div class="card">
    <div>💰 Flip Target</div>
    <div class="big" id="flipWorth">$0</div>

    <div>🏷 Sell Range</div>
    <div class="big" id="flipSell">$0</div>
  </div>

  <!-- 🔗 BUTTONS -->
  <button class="orange" onclick="goFlip()">💸 Make Money Now</button>
  <button class="purple" onclick="goLife()">🧠 Life Mode</button>
  <button class="green" onclick="installApp()">⬇️ Install</button>
  <button class="blue" onclick="shareApp()">📤 Share</button>

</div>

</div>

<script>
function calculate() {
  const income = parseFloat(document.getElementById("income").value) || 0;
  const expenses = parseFloat(document.getElementById("expenses").value) || 0;
  const days = parseFloat(document.getElementById("days").value) || 1;

  const moneyLeft = income - expenses;
  const daily = moneyLeft / days;

  document.getElementById("moneyLeft").innerText = "$" + moneyLeft.toFixed(2);
  document.getElementById("daily").innerText = "$" + daily.toFixed(2);

  document.getElementById("daysWarning").innerText =
    "You have " + days + " days left";

  let percent = income > 0 ? (expenses / income) * 100 : 0;
  document.getElementById("progressBar").style.width = percent + "%";

  let statusText = "";
  let statusClass = "";

  if (daily < 10) {
    statusText = "🔴 Risk";
    statusClass = "status-danger";
  } else if (daily < 30) {
    statusText = "🟡 Caution";
    statusClass = "status-warning";
  } else {
    statusText = "🟢 Good";
    statusClass = "status-good";
  }

  const statusEl = document.getElementById("status");
  statusEl.innerText = statusText;
  statusEl.className = statusClass;

  let guide = "";
  let flipWorth = 0;

  if (daily < 10) {
    guide = "🚨 Make money now. Go to Flip or Life Mode.";
    flipWorth = 50;
  } else if (daily < 30) {
    guide = "⚠️ Earn extra today.";
    flipWorth = 100;
  } else {
    guide = "✅ Stay consistent.";
    flipWorth = 150;
  }

  const guideEl = document.getElementById("actionGuide");
  guideEl.innerText = guide;

  document.getElementById("flipWorth").innerText = "$" + flipWorth;
  document.getElementById("flipSell").innerText =
    "$" + (flipWorth * 1.3).toFixed(0) + " - $" + (flipWorth * 1.5).toFixed(0);
}

function goFlip() {
  window.location.href = "flip.html";
}

function goLife() {
  window.location.href = "lifemode.html";
}

function installApp() {
  alert("Add to home screen");
}

function shareApp() {
  alert("Share this app");
}
</script>

</body>
</html>
