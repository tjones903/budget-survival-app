<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Survival</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #0f0f0f, #1c1c1c);
    color: white;
    text-align: center;
    padding: 20px;
  }

  h1 {
    font-size: 28px;
    margin-bottom: 10px;
  }

  .card {
    background: #1e1e1e;
    padding: 20px;
    border-radius: 16px;
    margin: 15px 0;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
  }

  input {
    width: 90%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    background: #2a2a2a;
    color: white;
  }

  button {
    width: 95%;
    padding: 14px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    background: #00c853;
    color: white;
    cursor: pointer;
    font-weight: bold;
  }

  button:hover {
    background: #00e676;
  }

  .big {
    font-size: 42px;
    font-weight: bold;
    margin: 10px 0;
  }

  .label {
    opacity: 0.7;
    font-size: 14px;
  }

  .warning {
    color: #ff5252;
    font-weight: bold;
    margin-top: 10px;
  }

  .okay {
    color: #ffd740;
    font-weight: bold;
    margin-top: 10px;
  }

  .good {
    color: #00e676;
    font-weight: bold;
    margin-top: 10px;
  }

</style>
</head>

<body>

<h1>💰 Budget Survival</h1>
<p>Will your money last?</p>

<div class="card">
  <input type="number" id="income" placeholder="Total Income ($)">
  <input type="number" id="expenses" placeholder="Total Expenses ($)">
  <input type="number" id="days" placeholder="Days Until Payday">

  <button onclick="calculate()">Calculate</button>
</div>

<div class="card" id="results" style="display:none;">
  
  <div class="label">Money Left</div>
  <div class="big" id="moneyLeft">$0</div>

  <div class="label">Daily Budget</div>
  <div class="big" id="daily">$0</div>

  <div id="status"></div>

</div>

<script>
function calculate() {
  const income = parseFloat(document.getElementById("income").value) || 0;
  const expenses = parseFloat(document.getElementById("expenses").value) || 0;
  const days = parseFloat(document.getElementById("days").value) || 1;

  const moneyLeft = income - expenses;
  const daily = moneyLeft / days;

  document.getElementById("results").style.display = "block";
  document.getElementById("moneyLeft").innerText = "$" + moneyLeft.toFixed(2);
  document.getElementById("daily").innerText = "$" + daily.toFixed(2);

  let status = "";

  if (daily < 10) {
    status = "<div class='warning'>⚠️ You may run out of money early</div>";
  } else if (daily <= 30) {
    status = "<div class='okay'>⚠️ Be careful with spending</div>";
  } else {
    status = "<div class='good'>✅ You're in a good position</div>";
  }

  document.getElementById("status").innerHTML = status;
}
</script>

</body>
</html>
