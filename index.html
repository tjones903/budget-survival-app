<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Survival</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f2027, #0f0f0f);
  color: white;
}

/* 🔗 NAV (ADDED BACK) */
.nav {
  display: flex;
  justify-content: space-around;
  padding: 12px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
}

.nav a {
  color: white;
  text-decoration: none;
  padding: 8px 12px;
  border-radius: 8px;
  transition: 0.3s;
}

.nav a:hover {
  box-shadow: 0 0 12px #00e676;
  transform: scale(1.05);
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  text-shadow: 0 0 10px #00e676;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: rgba(30,30,30,0.6);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
  box-shadow: 0 0 15px rgba(0,255,200,0.2);
  transition: 0.3s;
}

.card:hover {
  box-shadow: 0 0 25px rgba(0,255,200,0.5);
}

label {
  display: block;
  margin-top: 10px;
  opacity: 0.9;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border-radius: 10px;
  border: none;
  background: #2a2a2a;
  color: white;
}

input:focus {
  outline: none;
  box-shadow: 0 0 10px #00e676;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #444;
  color: white;
  transition: 0.3s;
}

button:hover {
  box-shadow: 0 0 15px #00e676;
  transform: scale(1.05);
}

.big { font-size: 26px; }

.status-good { color:#00e676; text-shadow:0 0 10px #00e676; }
.status-warning { color:orange; text-shadow:0 0 10px orange; }
.status-danger { color:red; text-shadow:0 0 10px red; }
</style>
</head>

<body>

<!-- ✅ NAV BACK -->
<div class="nav">
  <a href="index.html">Home</a>
  <a href="tips.html">Tips</a>
  <a href="about.html">About</a>
</div>

<div class="header">💰 Budget Survival</div>

<div class="container">

<div class="card">
  <label>Monthly Income</label>
  <input id="income">

  <label>Monthly Expenses</label>
  <input id="expenses">

  <label>Days Left</label>
  <input id="days">

  <button onclick="calculate()">Calculate</button>
</div>

<div class="card">
  <div id="moneyLeft">$0</div>
  <div id="daily">$0</div>
  <div id="status"></div>
  <div id="message"></div>

  <button onclick="goFlip()">💸 Make Money</button>
  <button onclick="goLife()">🧠 Life Mode</button>
</div>

<div class="card">
  <h3>📊 History</h3>
  <ul id="history"></ul>
</div>

<div class="card">
  <h3>💰 Total Made</h3>
  <div id="totalMoney">$0</div>
</div>

</div>

<script>
let history = JSON.parse(localStorage.getItem("history")) || [];
let totalMoney = parseInt(localStorage.getItem("money")) || 0;

function saveHistory(entry){
  history.push(entry);
  localStorage.setItem("history", JSON.stringify(history));
  renderHistory();
}

function renderHistory(){
  let list=document.getElementById("history");
  list.innerHTML="";
  history.slice(-5).forEach(h=>{
    let li=document.createElement("li");
    li.innerText=h;
    list.appendChild(li);
  });
}

function calculate(){
  let income=+document.getElementById("income").value||0;
  let expenses=+document.getElementById("expenses").value||0;
  let days=+document.getElementById("days").value||1;

  let moneyLeft=income-expenses;
  let daily=moneyLeft/days;

  document.getElementById("moneyLeft").innerText="$"+moneyLeft;
  document.getElementById("daily").innerText="$"+daily.toFixed(2);

  let status="",message="";
  if(daily<10){status="🔴 Risk";message="Make money ASAP";}
  else if(daily<30){status="🟡 Careful";message="Earn extra";}
  else{status="🟢 Good";message="In control";}

  document.getElementById("status").innerText=status;
  document.getElementById("message").innerText=message;

  saveHistory("Left $"+moneyLeft+" Daily $"+daily.toFixed(2));
}

function goFlip(){location.href="flip.html";}
function goLife(){location.href="lifemode.html";}

renderHistory();
document.getElementById("totalMoney").innerText="$"+totalMoney;
</script>

</body>
</html>
