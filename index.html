<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Survival</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, Arial, sans-serif;
  background: linear-gradient(180deg, #0f0f0f, #1c1c1c);
  color: white;
}

/* HEADER */
.header {
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-around;
  background: #1a1a1a;
  padding: 12px;
}

.nav a {
  color: white;
  text-decoration: none;
  font-size: 14px;
}

/* MAIN CONTAINER */
.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

/* CARD */
.card {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
}

/* INPUTS */
input {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  background: #2a2a2a;
  color: white;
  font-size: 16px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  background: #00c853;
  color: white;
  border: none;
  font-size: 18px;
  margin-top: 10px;
}

/* RESULTS */
.big {
  font-size: 36px;
  margin: 8px 0;
}

.label {
  font-size: 14px;
  opacity: 0.7;
}

/* STATUS COLORS */
.warning { color: #ff5252; }
.okay { color: #ffb300; }
.good { color: #00e676; }

/* PROGRESS BAR */
.progress {
  height: 8px;
  background: #333;
  border-radius: 10px;
  margin-top: 10px;
}

.progress-bar {
  height: 8px;
  background: #00e676;
  border-radius: 10px;
  width: 0%;
}

/* MONEY BUTTON */
.money-btn {
  background: #ff9800;
}
</style>
</head>

<body>

<div class="header">💰 Budget Survival</div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="tips.html">Tips</a>
  <a href="about.html">About</a>
</div>

<div class="container">

<div class="card">
  <input type="number" id="income" placeholder="Income ($)">
  <input type="number" id="expenses" placeholder="Expenses ($)">
  <input type="number" id="days" placeholder="Days until payday">
  <button onclick="calculate()">Calculate</button>
</div>

<div class="card" id="results" style="display:none;">

  <div class="label">Money Left</div>
  <div class="big" id="moneyLeft"></div>

  <div class="label">Daily Budget</div>
  <div class="big" id="daily"></div>

  <div id="daysWarning"></div>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="status"></div>

  <button class="money-btn" onclick="goFlip()">💸 Make Money Now</button>

</div>

</div>

<script>
function calculate() {
  const income = parseFloat(incomeInput.value) || 0;
  const expenses = parseFloat(expensesInput.value) || 0;
  const days = parseFloat(daysInput.value) || 1;

  const moneyLeft = income - expenses;
  const daily = moneyLeft / days;

  localStorage.setItem("income", income);
  localStorage.setItem("expenses", expenses);
  localStorage.setItem("days", days);

  results.style.display = "block";

  moneyLeftDisplay.innerText = "$" + moneyLeft.toFixed(2);
  dailyDisplay.innerText = "$" + daily.toFixed(2);

  let daysToBroke = daily > 0 ? Math.floor(moneyLeft / daily) : 0;
  daysWarning.innerHTML = `<p>You have <b>${daysToBroke}</b> days before running out</p>`;

  let statusText = "";
  if (daily < 10) statusText = "<div class='warning'>⚠️ Risk of running out</div>";
  else if (daily <= 30) statusText = "<div class='okay'>⚠️ Tight budget</div>";
  else statusText = "<div class='good'>✅ You're in control</div>";

  status.innerHTML = statusText;

  let percent = income > 0 ? Math.min((expenses / income) * 100, 100) : 0;
  progressBar.style.width = percent + "%";
}

function goFlip() {
  window.location.href = "flip.html";
}

const incomeInput = document.getElementById("income");
const expensesInput = document.getElementById("expenses");
const daysInput = document.getElementById("days");

const moneyLeftDisplay = document.getElementById("moneyLeft");
const dailyDisplay = document.getElementById("daily");
const status = document.getElementById("status");
const results = document.getElementById("results");
const progressBar = document.getElementById("progressBar");
const daysWarning = document.getElementById("daysWarning");

window.onload = () => {
  const income = localStorage.getItem("income");
  const expenses = localStorage.getItem("expenses");
  const days = localStorage.getItem("days");

  if (income) incomeInput.value = income;
  if (expenses) expensesInput.value = expenses;
  if (days) daysInput.value = days;

  if (income && expenses && days) calculate();
};
</script>

</body>
</html>
