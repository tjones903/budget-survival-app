<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Survival</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #111;
  color: white;
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.nav {
  display: flex;
  justify-content: space-around;
  background: #1a1a1a;
  padding: 10px;
}

.nav a {
  color: white;
  text-decoration: none;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  background: #2a2a2a;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  background: #00c853;
  color: white;
  border: none;
  margin-top: 10px;
}

.big {
  font-size: 32px;
}

.progress {
  height: 8px;
  background: #333;
  border-radius: 10px;
  margin-top: 10px;
}

.progress-bar {
  height: 8px;
  background: #00e676;
  border-radius: 10px;
  width: 0%;
}

.money-btn {
  background: orange;
}
</style>
</head>

<body>

<div class="header">💰 Budget Survival</div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="tips.html">Tips</a>
  <a href="about.html">About</a>
</div>

<div class="container">

<div class="card">
  <input type="number" id="income" placeholder="Income">
  <input type="number" id="expenses" placeholder="Expenses">
  <input type="number" id="days" placeholder="Days until payday">
  <button onclick="calculate()">Calculate</button>
</div>

<div class="card" id="results" style="display:none;">
  <div>Money Left</div>
  <div class="big" id="moneyLeft"></div>

  <div>Daily Budget</div>
  <div class="big" id="daily"></div>

  <div id="daysWarning"></div>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="status"></div>

  <button class="money-btn" onclick="goFlip()">💸 Make Money Now</button>
</div>

</div>

<script>
function calculate() {
  const income = parseFloat(incomeInput.value) || 0;
  const expenses = parseFloat(expensesInput.value) || 0;
  const days = parseFloat(daysInput.value) || 1;

  const moneyLeft = income - expenses;
  const daily = moneyLeft / days;

  localStorage.setItem("income", income);
  localStorage.setItem("expenses", expenses);
  localStorage.setItem("days", days);

  results.style.display = "block";

  moneyLeftDisplay.innerText = "$" + moneyLeft.toFixed(2);
  dailyDisplay.innerText = "$" + daily.toFixed(2);

  daysWarning.innerHTML = `You have ${days} days left`;

  let percent = income > 0 ? (expenses / income) * 100 : 0;
  progressBar.style.width = percent + "%";

  status.innerHTML = daily < 10 
    ? "⚠️ Risk of running out"
    : daily < 30 
    ? "⚠️ Be careful"
    : "✅ You're good";
}

function goFlip() {
  window.location.href = "flip.html";
}

const incomeInput = document.getElementById("income");
const expensesInput = document.getElementById("expenses");
const daysInput = document.getElementById("days");

const moneyLeftDisplay = document.getElementById("moneyLeft");
const dailyDisplay = document.getElementById("daily");
const status = document.getElementById("status");
const results = document.getElementById("results");
const progressBar = document.getElementById("progressBar");
const daysWarning = document.getElementById("daysWarning");

window.onload = () => {
  const income = localStorage.getItem("income");
  const expenses = localStorage.getItem("expenses");
  const days = localStorage.getItem("days");

  if (income) incomeInput.value = income;
  if (expenses) expensesInput.value = expenses;
  if (days) daysInput.value = days;

  if (income && expenses && days) calculate();
};
</script>

</body>
</html>
