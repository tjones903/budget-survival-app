<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Budget Survival</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f5f7fb;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      padding: 10px;
      width: 95%;
      background: black;
      color: white;
      border: none;
      margin-top: 10px;
    }

    .links a {
      display: block;
      margin-top: 10px;
    }

    .good { color: green; }
    .bad { color: red; }
  </style>
</head>

<body>

<div class="box">
  <h1>💰 Budget Survival</h1>

  <input id="income" type="number" placeholder="Income">
  <input id="expenses" type="number" placeholder="Expenses">
  <input id="days" type="number" placeholder="Days until paycheck">

  <button onclick="calc()">Calculate</button>

  <p>Money Left: <b id="left">$0</b></p>
  <p>Daily Budget: <b id="daily">$0</b></p>
  <p id="status"></p>
  <p id="tips"></p>

  <div class="links">
    <a href="tips.html">💡 Tips</a>
    <a href="about.html">📘 About</a>
  </div>
</div>

<script>
function calc() {
  let i = +income.value || 0;
  let e = +expenses.value || 0;
  let d = +days.value || 1;

  let left = i - e;
  let daily = left / d;

  document.getElementById("left").innerText = "$" + left.toFixed(2);
  document.getElementById("daily").innerText = "$" + daily.toFixed(2);

  let s = document.getElementById("status");
  let t = document.getElementById("tips");

  if (left < 0) {
    s.innerText = "🚨 Over budget!";
    s.className = "bad";
    t.innerText = "Cut spending immediately.";
  } else if (daily < 10) {
    s.innerText = "⚠️ Risk of running out";
    s.className = "bad";
    t.innerText = "Limit food & trips.";
  } else {
    s.innerText = "✅ You're good";
    s.className = "good";
    t.innerText = "Try saving money.";
  }
}
</script>

</body>
</html>
