<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Mode</title>

<link rel="icon" href="icon.png">

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f2027, #0f0f0f);
  color: white;
}

.header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
  text-shadow: 0 0 12px #00e676;
}

.card {
  background: rgba(30,30,30,0.6);
  padding: 20px;
  border-radius: 15px;
  margin: 15px;
  box-shadow: 0 0 20px rgba(0,255,200,0.2);
  transition: 0.3s;
}

.card:hover {
  box-shadow: 0 0 30px rgba(0,255,200,0.4);
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  color: black;
}

.broke { background: linear-gradient(45deg, red, #ff5252); }
.hustle { background: linear-gradient(45deg, orange, #ff9800); }
.stable { background: linear-gradient(45deg, #00c853, #00e676); }
.emergency { background: linear-gradient(45deg, purple, #9c27b0); }

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00e676;
}

.result {
  margin-top: 15px;
  white-space: pre-line;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">🧠 Life Mode</div>

<div class="card">
  <button class="broke">💸 Broke</button>
  <button class="hustle">🔥 Hustle</button>
  <button class="stable">🧘 Stable</button>
  <button class="emergency">🚨 Emergency</button>

  <div id="output" class="result"></div>
</div>

<div class="card">
  <h3>✅ Track Wins</h3>
  <input placeholder="What did you complete?">
  <button style="background:linear-gradient(45deg,#2196f3,#00e5ff);">Add</button>
</div>

<div class="card">
  <button style="background:linear-gradient(45deg,#00e676,#00c853);">
⬅ Back to Home
</button>
</div>

</body>
</html>
