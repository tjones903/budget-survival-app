<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Mode</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f2027, #0f0f0f);
  color: white;
}

.header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
  text-shadow: 0 0 10px #00e676;
}

.card {
  background: rgba(30,30,30,0.6);
  padding: 20px;
  border-radius: 15px;
  margin: 15px;
  box-shadow: 0 0 15px rgba(0,255,200,0.2);
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  color: white;
  background: #444;
}

button:hover {
  box-shadow: 0 0 15px #00e676;
}

.result {
  margin-top: 15px;
  white-space: pre-line;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<div class="header">🧠 Life Mode</div>

<div class="card">
  <button onclick="setMode('broke')">💸 Broke Mode</button>
  <button onclick="setMode('hustle')">🔥 Hustle Mode</button>
  <button onclick="setMode('stable')">🧘 Stability Mode</button>
  <button onclick="setMode('emergency')">🚨 Emergency Mode</button>

  <div id="output" class="result"></div>
</div>

<div class="card">
  <h3>✅ Track Your Wins</h3>

  <input id="taskInput" placeholder="What did you complete?">

  <button onclick="addTask()">Add</button>

  <ul id="taskList"></ul>
</div>

<div class="card">
  <button onclick="goBack()">⬅ Back</button>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function renderTasks() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach((t, i) => {
    const li = document.createElement("li");
    li.innerHTML = `
      <input type="checkbox" ${t.done ? "checked" : ""} onchange="toggle(${i})">
      ${t.text}
    `;
    list.appendChild(li);
  });
}

function addTask() {
  const input = document.getElementById("taskInput");
  if (!input.value) return;

  tasks.push({ text: input.value, done: false });
  input.value = "";

  save();
}

function toggle(i) {
  tasks[i].done = !tasks[i].done;
  save();
}

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
  renderTasks();
}

function setMode(mode) {
  let message = "";

  if (mode === "broke") {
    message = "💸 Spend under $15\nFlip something today";
  }
  if (mode === "hustle") {
    message = "🔥 Make $100 today\nSell or hustle";
  }
  if (mode === "stable") {
    message = "🧘 Save money\nStay consistent";
  }
  if (mode === "emergency") {
    message = "🚨 STOP spending\nFind money NOW";
  }

  document.getElementById("output").innerText = message;
}

function goBack() {
  window.location.href = "index.html";
}

renderTasks();
</script>

</body>
</html>
