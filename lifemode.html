<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Mode</title>

<link rel="icon" href="icon.png">

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f2027, #0f0f0f);
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
  text-shadow: 0 0 12px #00e676;
}

/* CARD */
.card {
  background: rgba(30,30,30,0.6);
  padding: 20px;
  border-radius: 15px;
  margin: 15px;
  box-shadow: 0 0 20px rgba(0,255,200,0.2);
  transition: 0.3s;
}

.card:hover {
  box-shadow: 0 0 30px rgba(0,255,200,0.4);
}

/* BUTTON BASE */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  color: black;
  transition: 0.3s;
}

/* COLORS */
.broke { background: linear-gradient(45deg, red, #ff5252); }
.hustle { background: linear-gradient(45deg, orange, #ff9800); }
.stable { background: linear-gradient(45deg, #00c853, #00e676); }
.emergency { background: linear-gradient(45deg, purple, #9c27b0); }

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00e676;
}

.result {
  margin-top: 15px;
  white-space: pre-line;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<div class="header">🧠 Life Mode</div>

<div class="card">
  <button class="broke" onclick="setMode('broke')">💸 Broke</button>
  <button class="hustle" onclick="setMode('hustle')">🔥 Hustle</button>
  <button class="stable" onclick="setMode('stable')">🧘 Stable</button>
  <button class="emergency" onclick="setMode('emergency')">🚨 Emergency</button>

  <div id="output" class="result"></div>
</div>

<div class="card">
  <h3>✅ Track Wins</h3>
  <input id="taskInput" placeholder="What did you complete?">

  <button onclick="addTask()" style="background:linear-gradient(45deg,#2196f3,#00e5ff); color:black;">
Add
</button>

  <ul id="taskList"></ul>
</div>

<div class="card">
  <button onclick="window.location.href='index.html'" 
    style="background:linear-gradient(45deg,#00e676,#00c853); color:black;">
⬅ Back to Home
</button>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function render(){
  let list = document.getElementById("taskList");
  list.innerHTML="";
  tasks.forEach((t,i)=>{
    let li=document.createElement("li");
    li.innerHTML = `<input type="checkbox" ${t.done?"checked":""} onclick="toggle(${i})"> ${t.text}`;
    list.appendChild(li);
  });
}

function addTask(){
  let val=document.getElementById("taskInput").value;
  if(!val) return;
  tasks.push({text:val,done:false});
  save();
}

function toggle(i){
  tasks[i].done=!tasks[i].done;
  save();
}

function save(){
  localStorage.setItem("tasks",JSON.stringify(tasks));
  render();
}

/* ✅ ONLY ADDED ACTION STEPS */
function setMode(mode){
  let msg="";

  if(mode==="broke") msg=
"Spend under $15\nFlip something\n\nAction:\n• Flip 1 item today\n• Sell something you already own";

  if(mode==="hustle") msg=
"Make $100\nSell fast\n\nAction:\n• Flip 1–2 items\n• Post on Facebook Marketplace\n• Offer quick services";

  if(mode==="stable") msg=
"Save money\nStay consistent\n\nAction:\n• Flip 1 item for extra profit\n• Avoid unnecessary spending";

  if(mode==="emergency") msg=
"STOP spending\nGet money now\n\nAction:\n• Flip 2 items immediately\n• Sell anything of value\n• Use Flip It tool now";

  document.getElementById("output").innerText = msg;
}

render();
</script>

</body>
</html>
