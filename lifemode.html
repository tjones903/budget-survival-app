<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Mode</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f2027, #0f0f0f);
  color: white;
}

.header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
  text-shadow: 0 0 10px #00e676;
}

.card {
  background: rgba(30,30,30,0.6);
  padding: 20px;
  border-radius: 15px;
  margin: 15px;
  box-shadow: 0 0 15px rgba(0,255,200,0.2);
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  color: white;
  background: #444;
}

button:hover {
  box-shadow: 0 0 15px #00e676;
}

.result { margin-top: 15px; white-space: pre-line; }
</style>
</head>

<body>

<div class="header">🧠 Life Mode</div>

<div class="card">
  <button onclick="setMode('broke')">💸 Broke</button>
  <button onclick="setMode('hustle')">🔥 Hustle</button>
  <button onclick="setMode('stable')">🧘 Stable</button>
  <button onclick="setMode('emergency')">🚨 Emergency</button>

  <div id="output" class="result"></div>
  <div id="score"></div>
</div>

<script>
let score = 0;

function setMode(mode) {
  score += 5;

  let msg = "";

  if(mode==="broke") msg="Spend under $15\nFlip something today";
  if(mode==="hustle") msg="Make $100 today\nSell or flip fast";
  if(mode==="stable") msg="Save money\nStay consistent";
  if(mode==="emergency") msg="STOP spending\nFind money now";

  msg += "\n\nScore: " + score;

  document.getElementById("output").innerText = msg;
}
</script>

</body>
</html>
