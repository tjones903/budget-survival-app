<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Mode</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f2027, #0f0f0f);
  color: white;
}

.header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
  text-shadow: 0 0 10px #00e676;
}

.card {
  background: rgba(30,30,30,0.6);
  padding: 20px;
  border-radius: 15px;
  margin: 15px;
  box-shadow: 0 0 15px rgba(0,255,200,0.2);
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #444;
  color: white;
}

button:hover { box-shadow: 0 0 15px #00e676; }

.result { margin-top: 15px; white-space: pre-line; }
</style>
</head>

<body>

<div class="header">🧠 Life Mode</div>

<div class="card">
  <button onclick="setMode('broke')">💸 Broke</button>
  <button onclick="setMode('hustle')">🔥 Hustle</button>
  <button onclick="setMode('stable')">🧘 Stable</button>
  <button onclick="setMode('emergency')">🚨 Emergency</button>

  <div id="output" class="result"></div>
</div>

<div class="card">
  <h3>✅ Track Wins</h3>
  <input id="taskInput" placeholder="What did you complete?">
  <button onclick="addTask()">Add</button>
  <ul id="taskList"></ul>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function render(){
  let list = document.getElementById("taskList");
  list.innerHTML="";
  tasks.forEach((t,i)=>{
    let li=document.createElement("li");
    li.innerHTML = `<input type="checkbox" ${t.done?"checked":""} onclick="toggle(${i})"> ${t.text}`;
    list.appendChild(li);
  });
}

function addTask(){
  let val=document.getElementById("taskInput").value;
  if(!val) return;
  tasks.push({text:val,done:false});
  save();
}

function toggle(i){
  tasks[i].done=!tasks[i].done;
  save();
}

function save(){
  localStorage.setItem("tasks",JSON.stringify(tasks));
  render();
}

function setMode(mode){
  let msg="";
  if(mode==="broke") msg="Spend under $15\nFlip something";
  if(mode==="hustle") msg="Make $100\nSell fast";
  if(mode==="stable") msg="Save money\nStay consistent";
  if(mode==="emergency") msg="STOP spending\nGet money now";

  document.getElementById("output").innerText = msg;
}

render();
</script>

</body>
</html>
